<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keylab Performance Parties 2026 — Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #d8d8d8;
  --card:   #f5f5f5;
  --text1:  #111111;
  --text2:  #444444;
  --text3:  #888888;
  --border: #e0e0e0;
  --acc:    #1a56db;
  --cvp:    #6d28d9;
  --nav-bg: #ffffff;
  --f:      "Inter", system-ui, -apple-system, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text1);
  font-family: var(--f);
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.masthead {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 1.25rem 1.25rem;
  text-align: center;
}
.masthead-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: .4rem;
}
.masthead-title {
  font-size: clamp(22px, 5vw, 30px);
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--text1);
  line-height: 1.1;
  margin-bottom: .3rem;
}
.masthead-sub {
  font-size: 13px;
  color: var(--text3);
  font-weight: 400;
}

/* ── Day tabs ── */
.day-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--nav-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.day-nav::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0;
  font-family: var(--f);
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  padding: .85rem 1.25rem;
  border: none;
  border-bottom: 3px solid transparent;
  background: transparent;
  cursor: pointer;
  transition: color .12s, border-color .12s;
  white-space: nowrap;
  line-height: 1.2;
  text-align: center;
}
.day-tab:hover { color: var(--text1); }
.day-tab.active {
  color: var(--acc);
  border-bottom-color: var(--acc);
  font-weight: 700;
}

/* ── Content ── */
.content {
  max-width: 640px;
  margin: 0 auto;
  padding: 1.25rem 1rem 5rem;
}

/* ── Day section ── */
.day-section { display: none; }
.day-section.visible { display: block; }

.day-header {
  padding: 1rem 0 .75rem;
  margin-bottom: 1rem;
}
.day-header-name {
  font-size: 20px;
  font-weight: 700;
  color: var(--text1);
  letter-spacing: -.01em;
}
.day-header-date {
  font-size: 13px;
  color: var(--text3);
  font-weight: 400;
  margin-top: .15rem;
}

/* ── Segment group ── */
.segment-group { margin-bottom: 1.5rem; }
.segment-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  padding: .5rem 0;
  margin-bottom: .75rem;
  border-bottom: 1px solid var(--border);
}

/* ── Performer card ── */
.performer {
  background: var(--card);
  border-radius: 12px;
  padding: 1.1rem 1.15rem;
  margin-bottom: .75rem;
  box-shadow: 0 1px 3px rgba(0,0,0,.07);
}

.performer-name {
  font-size: 19px;
  font-weight: 700;
  color: var(--text1);
  line-height: 1.2;
  margin-bottom: .25rem;
  letter-spacing: -.01em;
}
.performer-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: .4rem;
  margin-bottom: .5rem;
}
.performer-instrument {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
}
.cvp-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--cvp);
  background: #ede9fe;
  border-radius: 20px;
  padding: 2px 8px;
}
.performer-teacher {
  font-size: 13px;
  color: var(--text3);
  font-weight: 400;
  margin-bottom: .65rem;
}
.performer-teacher em {
  font-style: normal;
  color: var(--text2);
  font-weight: 600;
}

/* ── Songs ── */
.songs { margin-bottom: .7rem; }
.song-line {
  font-size: 15px;
  color: var(--text1);
  line-height: 1.5;
  padding-left: 1rem;
  position: relative;
}
.song-line::before {
  content: "\2022";
  position: absolute;
  left: 0;
  color: var(--acc);
  font-weight: 700;
}
.song-title {
  font-weight: 600;
}
.song-composer {
  color: var(--text3);
  font-weight: 400;
  font-size: 14px;
}
.song-line + .song-line { margin-top: .25rem; }

/* ── Program notes ── */
.program-notes {
  font-size: 14px;
  line-height: 1.65;
  color: var(--text2);
  margin-top: .6rem;
  padding-top: .6rem;
  border-top: 1px solid var(--border);
}

/* ── Loading / error ── */
.state-msg {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text3);
  font-size: 14px;
}
.state-msg .spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--text3);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin-bottom: 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 2rem 1rem;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text3);
}

@media print {
  .day-nav { display: none; }
  .day-section { display: block !important; }
  .performer { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
}
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-eyebrow">Keylab Music School &middot; 94 Luquer St, Brooklyn</div>
  <div class="masthead-title">Performance Parties 2026</div>
  <div class="masthead-sub">June 15&ndash;19 &middot; Program</div>
</div>

<nav class="day-nav" id="dayNav"></nav>

<div class="content" id="content">
  <div class="state-msg" id="stateMsg">
    <div class="spinner"></div><br>Loading program&hellip;
  </div>
</div>

<div class="footer">Keylab Music School &middot; keylab.nyc</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzenlfK9eu0G17af-fdjrkiRT-qZLcsLByN-QGb_SCIpmev_xoI3PkY6OW92nuiz4L45g/exec';
var DAY_ORDER  = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
var DAY_DATES  = {Monday:'June 15',Tuesday:'June 16',Wednesday:'June 17',Thursday:'June 18',Friday:'June 19'};
var SEG_ORDER  = ['Early','Single','Late'];
var SEG_LABELS = {Early:'Early Session',Single:'Single Session',Late:'Late Session'};
var activeDay  = null;

function api(payload, cb) {
  fetch(GAS_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(payload)
  })
  .then(function(res) { return res.json(); })
  .then(function(r)   { cb(null, r); })
  .catch(function(e)  { cb(String(e)); });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildInstrumentLabel(p) {
  var i1 = (p.instrument  || '').trim();
  var i2 = (p.instrument2 || '').trim();
  if (!i1 && !i2) return '';
  if (!i2 || i1.toLowerCase() === i2.toLowerCase()) return i1;
  return i1 + ', ' + i2;
}

function buildTeacherLabel(p) {
  var t1 = (p.teacherFull  || '').trim();
  var t2 = (p.teacherFull2 || '').trim();
  if (!t1 && !t2) return '';
  if (!t2) return t1;
  if (!t1) return t2;
  return t1 + ' &amp; ' + t2;
}

function renderPerformer(p) {
  var isCvp = p.status === 'confirmed-video';
  var instr  = buildInstrumentLabel(p);
  var teacher = buildTeacherLabel(p);

  var h = '<div class="performer">';

  // Name
  h += '<div class="performer-name">' + esc(p.name) + '</div>';

  // Instrument + CVP badge
  h += '<div class="performer-meta">';
  if (instr) h += '<span class="performer-instrument">' + esc(instr) + '</span>';
  if (isCvp) h += '<span class="cvp-badge">Video Performance</span>';
  h += '</div>';

  // Teacher
  if (teacher) {
    h += '<div class="performer-teacher">Teacher: <em>' + teacher + '</em></div>';
  }

  // Songs
  var hasSong1 = (p.song1Title || '').trim();
  var hasSong2 = (p.song2Title || '').trim();
  if (hasSong1 || hasSong2) {
    h += '<div class="songs">';
    if (hasSong1) {
      h += '<div class="song-line">';
      h += '<span class="song-title">' + esc(p.song1Title) + '</span>';
      if ((p.song1Composer || '').trim()) {
        h += ' <span class="song-composer">&mdash; ' + esc(p.song1Composer) + '</span>';
      }
      h += '</div>';
    }
    if (hasSong2) {
      h += '<div class="song-line">';
      h += '<span class="song-title">' + esc(p.song2Title) + '</span>';
      if ((p.song2Composer || '').trim()) {
        h += ' <span class="song-composer">&mdash; ' + esc(p.song2Composer) + '</span>';
      }
      h += '</div>';
    }
    h += '</div>';
  }

  // Program notes (song1Info first, then song2Info if different)
  var notes1 = (p.song1Info || '').trim();
  var notes2 = (p.song2Info || '').trim();
  var notes  = notes1;
  if (notes2 && notes2 !== notes1) notes = notes1 ? notes1 + ' ' + notes2 : notes2;
  if (notes) {
    h += '<div class="program-notes">' + esc(notes) + '</div>';
  }

  h += '</div>';
  return h;
}

function renderDay(dayPerformers, day) {
  // Group by segment
  var bySegment = {};
  dayPerformers.forEach(function(p) {
    var seg = p.segment || 'Single';
    if (!bySegment[seg]) bySegment[seg] = [];
    bySegment[seg].push(p);
  });

  var segs = SEG_ORDER.filter(function(s) { return bySegment[s] && bySegment[s].length; });
  // Also catch any unexpected segment values
  Object.keys(bySegment).forEach(function(s) {
    if (segs.indexOf(s) === -1) segs.push(s);
  });

  var h = '<div class="day-header">';
  h += '<div class="day-header-name">' + esc(day) + '</div>';
  h += '<div class="day-header-date">' + esc(DAY_DATES[day] || '') + '</div>';
  h += '</div>';

  segs.forEach(function(seg) {
    var group = bySegment[seg];
    if (!group || !group.length) return;
    h += '<div class="segment-group">';
    // Only show segment label if more than one segment on this day
    if (segs.length > 1) {
      h += '<div class="segment-label">' + esc(SEG_LABELS[seg] || seg) + '</div>';
    }
    group.forEach(function(p) { h += renderPerformer(p); });
    h += '</div>';
  });

  return h;
}

function showDay(day) {
  activeDay = day;
  document.querySelectorAll('.day-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.day === day);
  });
  document.querySelectorAll('.day-section').forEach(function(s) {
    s.classList.toggle('visible', s.dataset.day === day);
  });
}

function render(performers) {
  // Group by day
  var byDay = {};
  performers.forEach(function(p) {
    var d = p.day || 'Unscheduled';
    if (!byDay[d]) byDay[d] = [];
    byDay[d].push(p);
  });

  var days = DAY_ORDER.filter(function(d) { return byDay[d] && byDay[d].length; });
  // Catch any unlisted days
  Object.keys(byDay).forEach(function(d) {
    if (days.indexOf(d) === -1) days.push(d);
  });

  if (!days.length) {
    document.getElementById('stateMsg').style.display = 'block';
    document.getElementById('stateMsg').innerHTML = 'No performers confirmed yet.';
    return;
  }

  // Build nav tabs
  var nav = document.getElementById('dayNav');
  nav.innerHTML = days.map(function(d) {
    return '<button class="day-tab" data-day="' + esc(d) + '" onclick="showDay(\'' + esc(d) + '\')">' +
           esc(d) + (DAY_DATES[d] ? '<br><span style="font-size:10px;opacity:.7">' + esc(DAY_DATES[d]) + '</span>' : '') +
           '</button>';
  }).join('');

  // Build content sections
  var content = document.getElementById('content');
  content.innerHTML = days.map(function(d) {
    return '<div class="day-section" data-day="' + esc(d) + '">' + renderDay(byDay[d], d) + '</div>';
  }).join('');

  // Show first day
  showDay(days[0]);
}

// Load
api({action: 'getProgram'}, function(err, r) {
  var msg = document.getElementById('stateMsg');
  if (err || !r || !r.ok) {
    msg.innerHTML = 'Could not load program. Please refresh and try again.';
    return;
  }
  msg.style.display = 'none';
  render(r.performers || []);
});
</script>
</body>
</html>
