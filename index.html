  return map[st] || st;
}

function statusPillClass(st) {
  if (st === 'confirmed')        return 'pill-confirmed';
  if (st === 'confirmed-guest')  return 'pill-confirmed-guest';
  if (st === 'cancelled')        return 'pill-cancelled';
  if (st === 'not-participating') return 'pill-not-participating';
  return 'pill-unconfirmed';
}

function statusExplain(st) {
  if (st === 'unconfirmed')        return 'Your participation has not yet been confirmed. Please confirm using the options below.';
  if (st === 'confirmed')          return "You're confirmed as a performer.";
  if (st === 'confirmed-guest')    return "You're confirmed as attending, not performing.";
  if (st === 'cancelled')          return 'Your participation has been cancelled. See options below to rejoin.';
  if (st === 'not-participating')  return 'You are marked as not attending. Please contact us at info@keylab.nyc for assistance.';
  return '';
}

  if (st === 'confirmed-guest')  return 'status-confirmed-guest';

function doLookup() {

  var n = (document.getElementById("fn") || {}).value || "";
  if (!n.trim()) { showErr("Please enter the student's first name."); return; }
  lookupName = n.trim();
  state = "loading"; render();
  api({action:"lookup", name:lookupName, password:"", email:""}, function(e, r) {
    if (e || !r)  { state = "lookup"; showErr("Connection error. Please try again."); return; }
    if (!r.ok && !r.multiple) { state = "lookup"; showErr(r.error || "No student found. Check the spelling or contact info@keylab.nyc."); return; }
    if (r.multiple) {
      lookupMatches = r.matches;
      state = "pick-student"; errMsg = ''; render();
    } else if (r.nameOnly) {
      selectedMatch = r.match;
      lookupMatches = [];
      state = "auth"; errMsg = ''; render();
    } else {
      // Shouldn't happen in step 1, but handle gracefully
      state = "lookup"; showErr("Could not find student. Please try again.");
    }
  });
}

function doAuth() {
  errMsg = '';
  var pw    = (document.getElementById("fpw")   || {}).value || "";

  if (!pw.trim()) { showErr("Please enter your password."); return; }
  lookupPw = pw.trim(); lookupEmail = email.trim();
  state = "loading"; render();
  api({action:"lookup", name:selectedMatch.name, studentId:selectedMatch.id, password:lookupPw, email:lookupEmail}, function(e, r) {
    if (e || !r)  { pendingAuthIntent = null; state = "auth"; showErr("Connection error. Please try again."); return; }
    if (!r.ok)    { pendingAuthIntent = null; state = "auth"; showErr(r.error || "Incorrect password."); return; }
    student = r.student;
    if (!lookupEmail && student.email) lookupEmail = student.email;
    api({action:"getSlots"}, function(e2, r2) {
      if (!e2 && r2 && r2.ok) { slots = r2.slots; phase = r2.phase; }
      else { phase = phase || 'pre'; }
      pendingAuthIntent = null;
      managingBooking = false;
      state = "found"; errMsg = ''; render();
    });
  });
}

// ── Rejoin ─────────────────────────────────────────────────────
function doRejoin() {
  // Always fetch fresh slot data before attempting any rejoin
  state = "loading"; render();
  api({action:"getSlots"}, function(e, r) {
    if (!e && r && r.ok) { slots = r.slots; phase = r.phase; }
    doRejoinWithFreshSlots();
  });
}

function doRejoinWithFreshSlots() {
  if (phase === 'pre' || phase === 'priority') {
    var tags = student.tags || '';
    var origMatch = tags.match(/orig:([A-Za-z]+)_([A-Za-z]+)/);
    if (origMatch) {
      var origDay = origMatch[1];
      var origSeg = origMatch[2];
      var origKey = origDay + '_' + origSeg;
      var slotData = slots && slots[origKey];
      if (slotData && !slotData.isFull) {
        api({action:"rejoin", studentId:student.id, password:lookupPw, toDay:origDay, toSeg:origSeg, email:lookupEmail}, function(e, r) {
          if (e || !r || !r.ok) {
            // Slot raced to full between check and write — show dead-end
            state = "found";
            showErr("Your original segment just filled up. Check back on May 4th when self-service scheduling opens, or submit a scheduling request and we\u2019ll be in touch asap.");
            render(); return;
          }
          student.day = origDay; student.seg = origSeg; student.status = 'confirmed';
          api({action:"getSlots"}, function(e2, r2) {
            if (!e2 && r2 && r2.ok) { slots = r2.slots; }
            window._swapResult = r.confirmation;
            state = "swap-confirmed"; render();
          });
        });
        return;
      } else {
        // Orig slot full or unknown — dead-end, no grid
        state = "found";
        errMsg = "Your original segment is now full. Check back on May 4th when self-service scheduling opens, or submit a scheduling request and we\u2019ll be in touch with an update asap.";
        render();
        return;
      }
    }
    // No orig tag — shouldn't happen, but dead-end gracefully
    state = "found";
    errMsg = "No original segment found. Please contact us at info@keylab.nyc for assistance.";
    render();
    return;
  }

  api({action:"rejoin", studentId:student.id, password:lookupPw}, function(e, r) {
    if (e || !r || !r.ok) { state = "found"; showErr((r && r.error) || "Could not process. Please try again."); return; }
    if (r.needsSlot) {
      var origDay = r.origDay;
      var origSeg = r.origSeg;
      api({action:"getSlots"}, function(e2, r2) {
        if (!e2 && r2 && r2.ok) { slots = r2.slots; }
        if (origDay && origSeg) {
          var origKey = origDay + '_' + origSeg;
          var slotData = slots && slots[origKey];
          window._rejoinOrigDay = (slotData && !slotData.isFull) ? origDay : null;
          window._rejoinOrigSeg = (slotData && !slotData.isFull) ? origSeg : null;
        }
        window._rejoinPickContext = 'open';
        state = "swap"; errMsg = ''; render();
      });
    } else {
      state = "found"; render();
    }
  });
}

function doRejoinDirect(toDay, toSeg) {
  state = "loading"; render();
  api({action:"rejoin", studentId:student.id, password:lookupPw, toDay:toDay, toSeg:toSeg, email:lookupEmail}, function(e, r) {
    if (e || !r || !r.ok) {
      if (r && r.slotFull) {
        api({action:"getSlots"}, function(e2, r2) {
          if (!e2 && r2 && r2.ok) { slots = r2.slots; phase = r2.phase; }
          if (phase === 'open') {
            state = "swap"; window._rejoinOrigDay = null; window._rejoinOrigSeg = null;
            errMsg = "This segment is now full. Choose another spot below. The schedule locks June 1st.";
          } else {
            window._rejoinPickContext = 'full';
            state = "rejoin-pick";
            errMsg = "This segment is now full. Choose another spot below. The schedule locks June 1st.";
          }
          render();
        });
      } else {
        state = "found"; showErr((r && r.error) || "Could not restore. Please try again.");
      }
      return;
    }
    student.day = toDay; student.seg = toSeg; student.status = 'confirmed';
    api({action:"getSlots"}, function(e2, r2) {
      if (!e2 && r2 && r2.ok) { slots = r2.slots; }
      window._swapResult = r.confirmation;
      window._rejoinOrigDay = null; window._rejoinOrigSeg = null;
      state = "swap-confirmed"; render();
    });
  });
}

// ── Render ─────────────────────────────────────────────────────
function attachFoundListeners(root) {
  root.addEventListener('click', function(e) {
    var el = e.target;
    while (el && el !== root) {
      var action = el.getAttribute && el.getAttribute('data-action');
      if (action) {
        if (action === 'modifyRequest') doModifyRequest();
        else if (action === 'cancelRequest') { state = 'withdraw-confirm'; errMsg = ''; render(); }
        else if (action === 'manageBooking') { managingBooking = true; render(); }
        return;
      }
      el = el.parentNode;
    }
  });
}

function attachWithdrawListener(root) {
  // withdraw-confirm flow removed — listener retained as no-op for safety
}

function render() {
  var root = document.getElementById("root");
  if (!root) return;

  if (state === "loading" || state === "swapping") {
    root.innerHTML = '<div class="loading-wrap"><span class="spin">&#10227;</span> ' +
      (state === "swapping" ? "Saving your change\u2026" : "One moment\u2026") + '</div>';
    renderInfo("lookup");
    return;
  }

  var screens = {
    "lookup":           function() { root.innerHTML = rLookup();          renderInfo("lookup"); },
    "pick-student":     function() { root.innerHTML = rPickStudent();     renderInfo("lookup"); },
    "auth":             function() { root.innerHTML = rAuth();            renderInfo("lookup"); },
    "found":            function() { root.innerHTML = rFound();           renderInfo("found"); attachFoundListeners(root); },
    "guest-select":     function() { root.innerHTML = rGuestSelect(); renderInfo("found"); updateGuestNameFields(); },
    "preferences":      function() { root.innerHTML = rPreferences();     renderInfo("found"); },
    "pref-sent":        function() { root.innerHTML = rPrefSent();        renderInfo("found"); },
    "cancel":           function() { root.innerHTML = rCancel();          renderInfo("found"); },
    "cancel-confirmed": function() { root.innerHTML = rCancelConfirmed(); renderInfo("found"); },
    "unconfirm":        function() { root.innerHTML = rUnconfirm();       renderInfo("found"); },
    "edit-guests":      function() { root.innerHTML = rEditGuests();      renderInfo("found"); },
    "rejoin-pick":      function() {
      if (!slots) { state = "loading"; render(); api({action:"getSlots"}, function(e,r) { if(!e&&r&&r.ok){slots=r.slots;phase=r.phase;} state="rejoin-pick"; render(); }); return; }
      root.innerHTML = rRejoinPick(); renderInfo("found");
    },
    "swap":             function() { root.innerHTML = rSwap();            renderInfo("found"); },
    "swap-confirm":     function() { root.innerHTML = rSwapConfirm();    renderInfo("found"); },
    "swap-confirmed":   function() { root.innerHTML = rSwapConfirmed();   renderInfo("found"); },
    "confirm-sent":     function() { root.innerHTML = rConfirmSent();     renderInfo("found"); },
    "messaging":        function() { root.innerHTML = rMessaging();       renderInfo("found"); },
    "msg-sent":         function() { root.innerHTML = rMsgSent();         renderInfo("found"); },
    "withdraw-confirm": function() { root.innerHTML = rWithdrawConfirm();  renderInfo("found"); attachWithdrawListener(root); },
    "pref-confirm":     function() { root.innerHTML = rPrefConfirm();      renderInfo("found"); },
    "rejoin-orig-confirm": function() { root.innerHTML = rRejoinOrigConfirm(); renderInfo("found"); }
  };

  if (screens[state]) screens[state]();
}

      '</div>' +
      (m.tags && m.tags.indexOf('saturday') > -1
        ? '<div class="notice notice-info" style="margin-top:8px"><span class="ni">&#127926;</span><span>Performance Party Week runs Monday\u2013Friday, June 15\u201319. Since your child\u2019s regular lesson day is Saturday, they don\u2019t have a pre-assigned spot \u2014 but we\u2019d love to have them perform! Log in to request a preferred day before May 4th, or self-service reschedule into any open spot from May 4th.</span></div>'
        : '<p style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.4">Your child is not currently scheduled. Log in to manage your booking.</p>');
  } else if (!m.day || !m.seg) {
    // No segment assigned — show saturday-style notice regardless of tag
    html += '<div class="assign-top">' +
      '<div><div class="assign-label">Performance booking</div>' +
      '<div class="assign-day">' + esc(m.name || '') + '</div></div>' +
      '<span class="status-pill pill-unconfirmed">' + statusLabel(st) + '</span>' +
      '</div>' +
      '<div class="notice notice-info" style="margin-top:8px"><span class="ni">&#127926;</span><span>' +
      'Performance Party Week runs Monday–Friday, June 15–19. Since your child’s regular lesson day is Saturday, they don’t have a pre-assigned spot — but we’d love to have them perform! ' +
      'Log in to request a preferred day before May 4th, or self-service reschedule into any open spot from May 4th.</span></div>';
  } else {
    html += '<div class="assign-top">' +
      '<div><div class="assign-label">' + esc(m.name || '') + (isGuest ? ' is attending:' : st === 'unconfirmed' ? ' is invited to perform:' : ' is scheduled to perform:') + '</div>' +
      '<div class="assign-day">' + (m.day || '') + ', ' + (dateLabels[m.day] || '') + '</div>' +
      '<div class="assign-seg">' + (segLabels[m.seg] || '') + ' &mdash; ' + (timeLookup[m.seg] || '') + '</div>' +
      '<div class="assign-seg" style="font-size:12px;color:var(--text3)">Approx. 45 min &ndash; 1 hour</div></div>' +
      '<span class="status-pill ' + statusPillClass(st) + '">' + statusLabel(st) + '</span>' +
      '</div>';
    html += '<div class="arrive-badge">&#128336; ' + (arriveLookup[m.seg] || '') + '</div>';
    // Guests + names if confirmed
    if (isConfirmed || isGuest) {
      var gCount = parseInt(m.guests) || 0;
      var guestNamesHtml = '';
      if (m.guestNames && m.guestNames.length > 0) {
        guestNamesHtml = '<div class="assign-meta-item" style="flex-basis:100%;min-width:100%">' +
          '<div class="assign-meta-label">Guest names</div>' +
          '<div class="assign-meta-val" style="font-size:13px;font-weight:400">' +
          m.guestNames.map(function(n) { return esc(n); }).join(' &middot; ') +
          '</div></div>';
      }
      html += '<div class="assign-meta">' +
        '<div class="assign-meta-item"><div class="assign-meta-label">Guests</div>' +
        '<div class="assign-meta-val">' + gCount + '</div></div>' +
        guestNamesHtml + '</div>';
    }
  }
  html += '</div>';

  // Scheduling request callout (pre-login)
  if (m.schedRequest && m.schedRequest.length) {
    html += '<div class="notice notice-info" style="margin-bottom:16px;flex-direction:column;gap:4px">' +
      '<div style="font-weight:600;margin-bottom:4px">&#128197; Scheduling request under review</div>' +
      '<div><strong>Held spot:</strong> ' + (m.day && m.seg ? esc(m.day) + (m.seg !== 'Single' ? ' ' + esc(m.seg) : '') : 'Currently unassigned \u2014 no spot is being held') + '</div>' +
      '<div><strong>Requested:</strong> ' + m.schedRequest.filter(function(x){return x;}).map(function(x) { return esc(x); }).join(', ') + '</div>' +
      '<div style="margin-top:4px;font-size:12px">Your request is under review — we\'ll update you as soon as possible.</div>' +
      '</div>';
  }

  // Unconfirmed: prominent amber callout — suppress for students with no day/seg (saturday/unassigned)
  if (st === 'unconfirmed' && m.day && m.seg && !(m.tags && m.tags.indexOf('saturday') > -1)) {
    html += '<div class="notice notice-warn" style="border-width:2px;border-radius:10px;padding:16px 16px 14px;margin-bottom:16px">' +
      '<span class="ni">&#9888;&#65039;</span><span><strong>Action required — your spot is not yet confirmed</strong><br>' +
      'Please confirm your participation before May 4th. After May 4th, performance segments are open to all families on a first come first served basis with a maximum of 10 performers per segment.' +
      '</span></div>';
  }

  // ── Zone 2: Password entry ────────────────────────────────────
  html += '<div class="action-divider"></div>';

  // Email on file message
  var emailBlock = m.hasEmail
    ? '<div class="notice notice-success" style="margin-bottom:14px">&#10003; Your email is on file — confirmations will be sent to the address we have on record.</div>'
    : '<div class="field"><label>Email address <span style="font-weight:400;color:var(--text3)">(optional)</span></label>' +
      '<input id="femail" type="email" placeholder="your@email.com" autocomplete="email" ' +
      'onkeydown="if(event.key===&apos;Enter&apos;)doAuth()">' +
      '<div class="hint">No email on file — add yours to receive confirmation emails.</div></div>';

  html += emailBlock;
  html += '<div class="field"><label>Password</label>' +
    '<input id="fpw" type="password" placeholder="Your password" autocomplete="current-password" ' +
    'onkeydown="if(event.key===&apos;Enter&apos;)doAuth()">' +
    '<div class="hint">Check the Performance Party email sent to you previously for your password.</div></div>';

  html += errFrag();

  html += '<button class="btn-primary" onclick="doAuth()">Log in &rarr;</button>';

  html += '</div>' +
    '<div class="back-row"><button class="btn-nav" onclick="state=\'' + (lookupMatches.length > 1 ? 'pick-student' : 'lookup') + '\';errMsg=\'\';render()">&#8592; Back</button></div>';
  return html;
}

function doAuthWithIntent(intent) {
  pendingAuthIntent = intent;
  doAuth();
}

// ── Shared button-with-description helper ──────────────────────
function btnWrap(btnHtml, desc) {
  return '<div class="btn-wrap">' + btnHtml + '<div class="btn-desc">' + desc + '</div></div>';
}

// ── Screen: Found ──────────────────────────────────────────────
function rFound() {
  var s = student;
  var isInactive = s.status === 'cancelled' || s.status === 'not-participating';
  var firstName = esc(s.name.trim().split(/\s+/)[0]);
  var dateLabels = {
    Monday:'June 15', Tuesday:'June 16', Wednesday:'June 17',
    Thursday:'June 18', Friday:'June 19'
  };
  var sessionLabel = s.seg === 'Early' ? 'Early session' : s.seg === 'Late' ? 'Late session' : 'Single session';
  var timeLabel = {Early:'4:00 PM', Late:'5:00 PM', Single:'4:00 PM'}[s.seg] || '';

  var html = errFrag();

  // Booking card
  html += '<div class="assign-card">';

  if (isInactive) {
    html += '<div class="assign-top">' +
      '<div><div class="assign-label">Performance booking</div>' +
      '<div class="assign-day">' + firstName + '</div></div>' +
      '<span class="status-pill ' + statusPillClass(s.status) + '">' + statusLabel(s.status) + '</span>' +
      '</div>' +
      (s.tags && s.tags.indexOf('saturday') > -1
        ? '<div class="notice notice-info" style="margin-top:8px"><span class="ni">&#127926;</span><span>' + firstName + '\u2019s regular lesson day is Saturday and Performance Party Week runs Monday\u2013Friday. They don\u2019t have a pre-assigned spot \u2014 but we\u2019d love to have them perform! Use the options below to find an open spot.</span></div>'
        : '<p style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.4">Your child is not currently scheduled. Use the options below to manage your booking.</p>');
  } else if (!s.day || !s.seg) {
    // No segment assigned — saturday/unassigned student, show warm notice
    html += '<div class="assign-top">' +
      '<div><div class="assign-label">Performance booking</div>' +
      '<div class="assign-day">' + firstName + '</div></div>' +
      '<span class="status-pill pill-unconfirmed">' + statusLabel(s.status) + '</span>' +
      '</div>' +
      '<div class="notice notice-info" style="margin-top:8px"><span class="ni">&#127926;</span><span>' +
      firstName + '’s regular lesson day is Saturday and Performance Party Week runs Monday–Friday. They don’t have a pre-assigned spot — but we’d love to have them perform! Use the options below to find an open spot.</span></div>';
  } else {
    html += '<div class="assign-top">' +
      '<div><div class="assign-label">' +
      firstName + (s.status === 'confirmed-guest' ? ' is attending:' : s.status === 'unconfirmed' ? ' is invited to perform:' : ' is scheduled to perform:') +
      '</div>' +
      '<div class="assign-day">' + esc(s.day) + ', ' + esc(dateLabels[s.day] || '') + '</div>' +
      '<div class="assign-seg">' + sessionLabel + ' &mdash; ' + timeLabel + '</div>' +
      '<div class="assign-seg" style="font-size:12px;color:var(--text3)">Approx. 45 min &ndash; 1 hour</div></div>' +
      '<span class="status-pill ' + statusPillClass(s.status) + '">' + statusLabel(s.status) + '</span>' +
      '</div>';
    html += '<div class="arrive-badge">&#128336; ' + (ARRIVE[s.seg] || '') + '</div>';
    if (s.status === 'confirmed' || s.status === 'confirmed-guest') {
      var guestNamesCard = '';
      if (s.guestNames && s.guestNames.length > 0) {
        guestNamesCard = '<div class="assign-meta-item" style="flex-basis:100%;min-width:100%"><div class="assign-meta-label">Guest names</div>' +
          '<div class="assign-meta-val" style="font-size:13px;font-weight:400">' +
          s.guestNames.map(function(n) { return esc(n); }).join(' &middot; ') +
          '</div></div>';
      }
      html += '<div class="assign-meta">' +
        '<div class="assign-meta-item"><div class="assign-meta-label">Guests</div>' +
        '<div class="assign-meta-val">' + (parseInt(s.guests) || 0) + '</div></div>' +
        guestNamesCard +
        '</div>';
      html += calendarLinks(s);
    } else {
      html += '<p style="font-size:13px;color:var(--text2);margin-top:10px;line-height:1.4">' +
        esc(statusExplain(s.status)) + '</p>';
    }
  }

  html += '</div>';

  // Scheduling request callout
  var schedSegs = s.schedRequest || getLatestSchedRequest(s.notes);

  if (schedRequestCancelled) {
    html += '<div class="notice notice-info" style="margin-bottom:4px"><span class="ni">&#10003;</span><span>Your scheduling request has been updated. All previously requested segments have been cancelled. You can submit a new request at any time. Spots are available on a first come first served basis and are not guaranteed.</span></div>';
    schedRequestCancelled = false;
  } else if (schedSegs && schedSegs.length) {
    var heldSpot = (s.day && s.seg)
      ? esc(s.day) + (s.seg !== 'Single' ? ' ' + esc(s.seg) : '')
      : 'Currently unassigned \u2014 no spot is being held';
    html += '<div class="notice notice-info" style="flex-direction:column;gap:6px;margin-bottom:12px">' +
      '<div style="font-size:15px;font-weight:600">Your scheduling request has been received and is being reviewed.</div>' +
      '<div style="font-size:13px;margin-bottom:2px;line-height:1.5">' +
      '<strong>Held spot:</strong> ' + heldSpot +
      '</div>' +
      '<div style="font-size:13px;margin-bottom:10px;line-height:1.5">' +
      '<strong>Requested:</strong> ' + schedSegs.filter(function(x) { return x; }).map(function(x) { return esc(x); }).join(', ') +
      '</div>' +
      '</div>' +
      btnWrap('<button data-action="modifyRequest" class="btn-primary">Modify request</button>', 'Change the segments you requested.');
  }

  if (unconfirmReverted) {
    html += '<div class="notice notice-info" style="margin-bottom:4px"><span class="ni">&#10003;</span><span>Your status has been reverted to unconfirmed status. A backup spot is still being held for you, but is not guaranteed after May 4th. Click manage booking to see details. You can rejoin any segment until June 1st if there are spots available.</span></div>';
    unconfirmReverted = false;
  }

  // Email notice — success confirmation or prompt to add
  if (emailSaveSuccess) {
    html += '<div class="notice notice-success" style="margin-bottom:0"><span class="ni">&#10003;</span><span>' +
      '<strong>Email saved!</strong> Confirmation emails will be sent to ' + esc(lookupEmail) + '.' +
      '</span></div>';
    emailSaveSuccess = false;
  } else if (!lookupEmail) {
    html += '<div class="notice notice-warn" style="margin-bottom:0"><span class="ni">&#9993;</span><span>' +
      '<strong>No email on file.</strong> Add your email address so we can send you confirmations.' +
      '<div style="display:flex;gap:8px;margin-top:8px">' +
      '<input id="email-collect" type="email" placeholder="your@email.com" autocomplete="email" ' +
      'style="flex:1;font-family:\'DM Sans\',sans-serif;font-size:14px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text)">' +
      '<button onclick="doSaveEmail()" style="font-family:\'DM Sans\',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:7px;cursor:pointer">Save</button>' +
      '</div>' +
      '</span></div>';
  }

  html += '<div class="action-divider"></div>';

  var isConfirmedAny = s.status === 'confirmed' || s.status === 'confirmed-guest';
  if (isConfirmedAny && !managingBooking) {
    // Show single "Manage my booking" button — actions hidden until tapped
    html += btnWrap('<button class="btn-secondary" data-action="manageBooking">Manage my booking</button>', 'View and manage your booking options.');
  } else {
    html += rActions(s, isInactive);
  }

  html += '<div class="back-row"><button class="btn-nav" onclick="student=null;selectedMatch=null;lookupMatches=[];managingBooking=false;state=\'lookup\';errMsg=\'\';render()">Log out</button></div>';
  return html;
}

// ── Unified action block ───────────────────────────────────────
function rActions(s, isInactive) {
  var html = '';
  var hasPendingRequest = !!(s.schedRequest && s.schedRequest.length) || !!(getLatestSchedRequest(s.notes));

  // ── Confirmed performer: dedicated "Make a Change" section ────
  if (!isInactive && s.status === 'confirmed') {
    html += '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px">Make a change</div>';
    if (phase === 'open') {
      html += btnWrap(
        '<button class="btn-secondary" onclick="doStartSwap()">Reschedule &rarr;</button>',
        'Instantly reschedule into any open spot, per availability. Your current spot will be released.'
      );
    } else if (phase === 'pre' || phase === 'priority') {
      // Fix 7: status-aware scheduling request copy
      var schedReqDesc = 'Self-service rescheduling opens May 4th, but you can also request to be placed into any segment during performance week. We\'ll put a hold on your current spot so you don\'t lose it, review your request, and contact you asap with an update.';
      if (!hasPendingRequest) {
        html += btnWrap(
          '<button class="btn-secondary" onclick="doStartPreferences()">Request a reschedule</button>',
          schedReqDesc
        );
      }
    }
    // Unconfirm button — available through June 1st
    if (phase !== 'locked') {
      html += btnWrap(
        '<button class="btn-secondary" onclick="doStartUnconfirm()">Change my mind — revert to unconfirmed</button>',
        'If you\'re not ready to commit, you can revert to unconfirmed status. Your spot will be held for you.'
      );
    }
    // Edit guest list button
    if (phase !== 'locked') {
      html += btnWrap(
        '<button class="btn-secondary" onclick="doStartEditGuests()">Edit guest list</button>',
        'Change or remove guests from your booking.'
      );
    }
    // Change to attending (not performing)
    if (phase !== 'locked') {
      html += btnWrap(
        '<button class="btn-secondary" onclick="doStartConfirm(\'confirmed-guest\')">Change to attending, not performing</button>',
        'Update your status to attending non-performer. You can switch back to confirmed performer at any time.'
      );
    }
    html += btnWrap(
      '<button class="btn-cancel" onclick="doStartCancel()">Cancel / Not Attending</button>',
      phase === 'locked'
        ? 'Your spot will be released. The schedule is locked so rejoining is not guaranteed \u2014 contact us at info@keylab.nyc.'
        : 'Your spot will be released immediately. You can rejoin into any open spot up until June 1st.'
    );
    html += '<button class="btn-secondary" onclick="doStartMessage()">Send a message to Keylab</button>';
    return html;
  }

  // ── Confirmed-guest: attending non-performer ──────────────────
  if (!isInactive && s.status === 'confirmed-guest') {
    html += '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px">Make a change</div>';
    html += btnWrap(
      '<button class="btn-primary" onclick="doStartConfirm(\'confirmed\')">Confirm as performer &rarr;</button>',
      'Switch to confirmed performer. You\'ll select your guest count.'
    );
    if (phase === 'open') {
      html += btnWrap(
        '<button class="btn-secondary" onclick="doStartSwap()">Reschedule &rarr;</button>',
        'Instantly reschedule into any open spot, per availability. Your current spot will be released.'
      );
    } else if (phase !== 'locked' && !hasPendingRequest) {
      html += btnWrap(
        '<button class="btn-secondary" onclick="doStartPreferences()">Submit a scheduling request</button>',
        'Need a different day or segment? Submit a request and we\'ll do our best to accommodate you.'
      );
    }
    // Unconfirm button — available through June 1st
    if (phase !== 'locked') {
      html += btnWrap(
        '<button class="btn-secondary" onclick="doStartUnconfirm()">Change my mind — revert to unconfirmed</button>',
        'If you\'re not ready to commit, you can revert to unconfirmed status. Your spot will be held for you.'
      );
    }
    // Edit guest list button
    if (phase !== 'locked') {
      html += btnWrap(
        '<button class="btn-secondary" onclick="doStartEditGuests()">Edit guest list</button>',
        'Change or remove guests from your booking.'
      );
    }
    html += '<button class="btn-secondary" onclick="doStartMessage()">Send a message to Keylab</button>';
    html += '<div class="action-divider"></div>';
    html += btnWrap(
      '<button class="btn-cancel" onclick="doStartCancel()">Cancel / Not Attending</button>',
      phase === 'locked'
        ? 'Your spot will be released. The schedule is locked so rejoining is not guaranteed \u2014 contact us at info@keylab.nyc.'
        : 'Your spot will be released immediately. You can rejoin into any open spot up until June 1st.'
    );
    return html;
  }

  // ── Saturday/unassigned families: no segment, skip confirm buttons ──
  var isSaturday = (s.tags || '').indexOf('saturday') > -1 || (!s.day && !s.seg);
  if (isSaturday) {
    if (phase === 'pre' || phase === 'priority') {
      html += '<div class="notice notice-info"><span class="ni">&#127926;</span><span>' +
        'Submit a scheduling request and we\'ll do our best to place your child before May 4th. From May 4th you can self-service reschedule into any open spot.' +
        '</span></div>';
      if (!hasPendingRequest) {
        html += btnWrap(
          '<button class="btn-secondary" onclick="doStartPreferences()">Submit a scheduling request</button>',
          'Tell us your preferred days and we\'ll be in touch with available options.'
        );
      }
      html += btnWrap(
        '<button class="btn-cancel" onclick="doStartCancel()">Cancel / Not Attending</button>',
        'Let us know if your child won\'t be joining us this year.'
      );
    } else if (phase === 'open') {
      html += '<div class="notice notice-info"><span class="ni">&#127926;</span><span>' +
        'The schedule is now open! Pick any available spot below. Spots are first come, first served. The schedule locks June 1st.' +
        '</span></div>';
      html += btnWrap(
        '<button class="btn-primary" onclick="doRejoin()">Choose a performance spot &rarr;</button>',
        'Pick any available spot during performance week.'
      );
      html += btnWrap(
        '<button class="btn-cancel" onclick="doStartCancel()">Cancel / Not Attending</button>',
        'Let us know if your child won\'t be joining us this year.'
      );
    } else {
      // Locked
      html += '<div class="notice notice-warn"><span class="ni">&#128274;</span><span>' +
        'The schedule is now locked. To request a spot, email <a href="mailto:info@keylab.nyc">info@keylab.nyc</a>. Changes are not guaranteed.' +
        '</span></div>';
    }
    return html;
  }

  // ── Standard phase logic (unconfirmed + inactive) ─────────────
  if (phase === 'pre') {
    if (!isInactive) {
      // Only show priority deadline banner if not yet confirmed
      if (s.status !== 'confirmed' && s.status !== 'confirmed-guest') {
        html += '<div class="notice notice-info"><span class="ni">&#128197;</span><span>' +
          '<strong>Priority deadline April 30th:</strong> Confirm by April 30th for scheduling priority and a guaranteed guest allowance of up to 3 guests.' +
          '</span></div>';
      }
      if (s.status !== 'confirmed') {
        html += btnWrap(
          '<button class="btn-primary" onclick="doStartConfirm(\'confirmed\')">Confirm as performer &rarr;</button>',
          'Reserve your child\'s performance spot and up to 3 guest seats.'
        );
      }
      if (s.status !== 'confirmed-guest') {
        html += btnWrap(
          '<button class="btn-secondary" onclick="doStartConfirm(\'confirmed-guest\')">Confirm as attending, not performing</button>',
          'Attending but not performing. Includes up to 3 guest seats.'
        );
      }
    } else {
      // Inactive — offer original slot restore only (no grid picker until May 4th)
      var tags = s.tags || '';
      var origMatch = tags.match(/orig:([A-Za-z]+)_([A-Za-z]+)/);
      if (origMatch) {
        var origDay = origMatch[1], origSeg = origMatch[2];
        var slotData = slots && slots[origDay + '_' + origSeg];
        if (slotData && !slotData.isFull) {
          html += btnWrap(
            '<button class="btn-primary" onclick="window._rejoinOrigConfirmDay=\'' + origDay + '\';window._rejoinOrigConfirmSeg=\'' + origSeg + '\';state=\'rejoin-orig-confirm\';render()">Return to ' + origDay + ' ' + origSeg + ' spot &rarr;</button>',
            'Restores you to your previously scheduled ' + origDay + ' ' + origSeg + ' spot instantly.'
          );
        } else {
          html += '<div class="notice notice-warn" style="margin-bottom:12px"><span class="ni">&#9888;</span><span>' +
            'Your original segment is now full. Check back on May 4th when self-service scheduling opens, or submit a scheduling request and we\'ll be in touch with an update asap.' +
            '</span></div>';
        }
      }
    }
    // Fix 7: status-aware scheduling request copy
    var isInactivePre = isInactive;
    var schedReqDesc2 = isInactivePre
      ? 'Submit a scheduling request and we\'ll do our best to place your child before May 4th. From May 4th you can instantly self-service reschedule into any open spot.'
      : 'Tell us your preferred days. Your request is under review. Visit keylab.nyc/performance-parties for details.';
    if (!hasPendingRequest) {
      html += btnWrap(
        '<button class="btn-secondary" onclick="doStartPreferences()">Submit a scheduling request</button>',
        schedReqDesc2
      );
    }
    if (!isInactive) {
      html += btnWrap(
        '<button class="btn-cancel" onclick="doStartCancel()">Cancel / Not Attending</button>',
        'Your spot will be released immediately. You can rejoin into any open spot up until June 1st.'
      );
    }

  } else if (phase === 'priority') {
    html += '<div class="notice notice-info"><span class="ni">&#8987;</span><span>' +
      'We\'re finalizing priority scheduling requests. Self-service rescheduling opens <strong>May 4th</strong>.' +
      '</span></div>';
    if (isInactive) {
      // Inactive students can still rejoin original slot during priority phase
      var tagsPri = s.tags || '';
      var origMatchPri = tagsPri.match(/orig:([A-Za-z]+)_([A-Za-z]+)/);
      if (origMatchPri) {
        var origDayPri = origMatchPri[1], origSegPri = origMatchPri[2];
        var slotDataPri = slots && slots[origDayPri + '_' + origSegPri];
        if (slotDataPri && !slotDataPri.isFull) {
          html += btnWrap(
            '<button class="btn-primary" onclick="window._rejoinOrigConfirmDay=\'' + origDayPri + '\';window._rejoinOrigConfirmSeg=\'' + origSegPri + '\';state=\'rejoin-orig-confirm\';render()">Return to ' + origDayPri + ' ' + origSegPri + ' spot &rarr;</button>',
            'Restores you to your previously scheduled spot instantly.'
          );
        } else {
          html += '<div class="notice notice-warn" style="margin-bottom:12px"><span class="ni">&#9888;</span><span>' +
            'Your original segment is now full. Check back on May 4th when self-service scheduling opens, or submit a scheduling request and we\'ll be in touch with an update asap.' +
            '</span></div>';
        }
      }
      if (!hasPendingRequest) {
        html += btnWrap(
          '<button class="btn-secondary" onclick="doStartPreferences()">Submit a scheduling request</button>',
          'We\'ll do our best to find you an available spot. Self-service rescheduling opens May 4th — schedule locks June 1st.'
        );
      }
    } else {
      html += btnWrap(
        '<button class="btn-cancel" onclick="doStartCancel()">Cancel / Not Attending</button>',
        'Your spot will be released immediately. You can rejoin into any open spot using this tool.'
      );
    }
    html += '<button class="btn-secondary" onclick="doStartMessage()">Send a message</button>';

  } else if (phase === 'open') {
    if (isInactive) {
      var tags2 = s.tags || '';
      var origMatch2 = tags2.match(/orig:([A-Za-z]+)_([A-Za-z]+)/);
      var origDay2 = null, origSeg2 = null;
      if (origMatch2) {
        origDay2 = origMatch2[1]; origSeg2 = origMatch2[2];
        var slotData2 = slots && slots[origDay2 + '_' + origSeg2];
        if (slotData2 && !slotData2.isFull) {
          // Fix 9: specific rejoin button copy
          html += btnWrap(
            '<button class="btn-primary" onclick="window._rejoinOrigConfirmDay=\'' + origDay2 + '\';window._rejoinOrigConfirmSeg=\'' + origSeg2 + '\';state=\'rejoin-orig-confirm\';render()">Return to ' + origDay2 + ' ' + origSeg2 + ' spot &rarr;</button>',
            'Restores you to your previously scheduled ' + origDay2 + ' ' + origSeg2 + ' spot instantly, if it\'s still available.'
          );
        } else if (slotData2 && slotData2.isFull) {
          html += '<div class="notice notice-warn" style="margin-bottom:12px"><span class="ni">&#9888;</span><span>' +
            'This segment is now full. ' +
            '<button onclick="doRejoin()" style="background:none;border:none;color:var(--warn);font-family:\'DM Sans\',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;padding:0">Choose another spot</button>. ' +
            'The schedule locks June 1st.' +
            '</span></div>';
        }
      }
      // Fix 9: "Choose a different spot" with specific copy
      var isSaturdayOpen = s.tags && s.tags.indexOf('saturday') > -1;
      html += btnWrap(
        '<button class="btn-secondary" onclick="doRejoin()">Choose a performance spot</button>',
        isSaturdayOpen
          ? 'Pick any available spot during performance week. Spots are first come, first served. The schedule locks June 1st.'
          : 'Pick any available spot during the week. Your original ' + (origDay2 ? origDay2 + ' ' + origSeg2 + ' ' : '') + 'spot will not be held \u2014 spots are first come, first served.'
      );
    } else if (s.status === 'unconfirmed') {
      // Unconfirmed in open phase — show confirm options first
      html += btnWrap(
        '<button class="btn-primary" onclick="doStartConfirm(\'confirmed\')">Confirm as performer &rarr;</button>',
        'Your child will perform. You\'ll select guest count and names on the next screen.'
      );
      html += btnWrap(
        '<button class="btn-primary" onclick="doStartConfirm(\'confirmed-guest\')">Attending, not performing</button>',
        'Your child will attend and cheer on the performers but will not perform.'
      );
      html += btnWrap(
        '<button class="btn-cancel" onclick="doStartCancel()">Cancel / Not Attending</button>',
        'Your spot will be released immediately. You can rejoin into any open spot before June 1st.'
      );
    } else {
      // Confirmed or confirmed-guest in open phase — show reschedule
      html += btnWrap(
        '<button class="btn-primary" onclick="doStartSwap()">Reschedule &rarr;</button>',
        'Move instantly to any available spot. Your current spot will be released.'
      );
      html += btnWrap(
        '<button class="btn-cancel" onclick="doStartCancel()">Cancel / Not Attending</button>',
        'Your spot will be released immediately. You can rejoin into any open spot before June 1st.'
      );
    }

  } else {
    // Locked
    html += '<div class="notice notice-warn"><span class="ni">&#128274;</span><span>' +
      'The schedule is now locked. To request a change, email <a href="mailto:info@keylab.nyc">info@keylab.nyc</a>. Changes are not guaranteed.' +
      '</span></div>';
    html += btnWrap('<button class="btn-secondary" onclick="doStartMessage()">Send a message</button>',
      'Contact us for assistance.');
    if (!isInactive) {
      html += btnWrap(
        '<button class="btn-cancel" onclick="doStartCancel()">Cancel / Not Attending</button>',
        'Your spot will be released immediately. The schedule is locked so rejoining is not guaranteed \u2014 contact us at info@keylab.nyc.'
      );
    }
  }

  return html;
}

// ── Screen: Guest selector ─────────────────────────────────────
function rGuestSelect() {
  var s = student;
  var dateLabels = {Monday:'June 15',Tuesday:'June 16',Wednesday:'June 17',Thursday:'June 18',Friday:'June 19'};
  var sessionLabel = s.seg === 'Early' ? 'Early session' : s.seg === 'Late' ? 'Late session' : 'Single session';
  var timeLabel = {Early:'4:00 PM', Late:'5:00 PM', Single:'4:00 PM'}[s.seg] || '';
  var slotDisplay = esc(s.day) + ', ' + (dateLabels[s.day] || '') + ' \u2014 ' + sessionLabel + ', ' + timeLabel;
  var isPerformer = pendingConfirmStatus === 'confirmed';
  var heading = isPerformer ? 'Confirm as performer' : 'Confirm as attending non-performer';

  var firstName = esc((student && student.name || '').trim().split(/\s+/)[0]);
  var descLine = isPerformer
    ? firstName + ' will have a confirmed spot as a performer.'
    : firstName + ' will attend and cheer on the performers but will not perform. You can still bring up to 3 guests, 4 people total.';

  var html = '<div class="card">' +
    '<div class="card-title">' + heading + '</div>' +
    '<p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5">' + descLine + '</p>' +
    '<div class="guest-summary">' +
    '<strong>' + esc(s.name) + '</strong><br>' +
    slotDisplay +
    '</div>' +
    errFrag();

  // Re-confirmation flow: student already has guest names on file
  if (s.guestNames && s.guestNames.length > 0) {
    html += '<p style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">Your guests on file:</p>';
    html += '<p style="font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.4">Edit a name or remove a guest seat below.</p>';

    if (pendingGuestList.length === 0) {
      html += '<div class="notice notice-warn" style="margin-bottom:12px"><span class="ni">&#9888;</span><span>All guest seats removed. Submitting will set your guest count to 0.</span></div>';
    }

    for (var gi = 0; gi < pendingGuestList.length; gi++) {
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
        '<input type="text" id="gname-' + gi + '" value="' + esc(pendingGuestList[gi]) + '" ' +
        'style="flex:1;font-family:\'DM Sans\',sans-serif;font-size:14px;padding:8px 11px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text)">' +
        '<button onclick="removeGuestSlot(' + gi + ')" style="flex-shrink:0;background:none;border:1.5px solid #e5c5c2;border-radius:7px;color:var(--err);font-size:12px;padding:6px 10px;cursor:pointer;font-family:\'DM Sans\',sans-serif">Remove</button>' +
        '</div>';
    }

    html += '<div class="notice notice-info" style="margin-top:4px;margin-bottom:14px"><span class="ni">&#8505;</span><span>' +
      'Guest seats are set at confirmation. Extra seats can be requested by emailing <a href="mailto:info@keylab.nyc" style="color:inherit;text-decoration:underline">info@keylab.nyc</a> — additional seats are not guaranteed.' +
      '</span></div>' +
      '<button class="btn-primary" onclick="doConfirmWithGuestNames()">Confirm &rarr;</button>';

  } else {
    // First-time confirmation flow
    var opts = '<option value="">Select\u2026</option>';
    for (var i = 0; i <= 3; i++) {
      opts += '<option value="' + i + '"' + (i === parseInt(s.guests) ? ' selected' : '') + '>' + i + (i === 1 ? ' guest' : ' guests') + '</option>';
    }
    html += '<p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5">You may bring up to 3 guests. Four people total including your child.</p>' +
      '<p style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px">How many guests will be attending?</p>' +
      '<div class="guest-select-wrap">' +
      '<label>Number of guests</label>' +
      '<select id="guest-count-sel" onchange="updateGuestNameFields()">' + opts + '</select>' +
      '</div>' +
      '<div id="guest-name-fields"></div>' +
      '<div class="notice notice-info" style="margin-top:14px;margin-bottom:14px"><span class="ni">&#8505;</span><span>' +

      '</span></div>' +
      '<button class="btn-primary" onclick="doConfirmWithGuests()">Confirm &rarr;</button>';
  }

  html += '</div>' +
    '<div class="back-row"><button class="btn-nav" onclick="state=\'found\';render()">&#8592; My booking</button></div>';
  return html;
}

function updateGuestNameFields() {
  var sel = document.getElementById("guest-count-sel");
  var container = document.getElementById("guest-name-fields");
  if (!sel || !container) return;
  var count = parseInt(sel.value);
  if (isNaN(count) || count === 0) { container.innerHTML = ''; return; }
  var html = '<p style="font-size:13px;font-weight:600;color:var(--text);margin:12px 0 8px">Guest names:</p>';
  for (var i = 0; i < count; i++) {
    html += '<div style="margin-bottom:8px">' +
      '<input type="text" id="gname-' + i + '" placeholder="Guest ' + (i + 1) + ' name" ' +
      'style="width:100%;font-family:\'DM Sans\',sans-serif;font-size:14px;padding:8px 11px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text)">' +
      '</div>';
  }
  container.innerHTML = html;
}

function removeGuestSlot(idx) {
  // Snapshot current input values into pendingGuestList before removing
  for (var i = 0; i < pendingGuestList.length; i++) {
    var inp = document.getElementById("gname-" + i);
    if (inp) pendingGuestList[i] = inp.value.trim() || pendingGuestList[i];
  }
  pendingGuestList.splice(idx, 1);
  errMsg = '';
  render(); // re-render guest-select with updated list
}

function doConfirmWithGuestNames() {
  errMsg = '';
  // Read current input values (rendered by index from pendingGuestList)
  var names = [];
  for (var i = 0; i < pendingGuestList.length; i++) {
    var inp = document.getElementById("gname-" + i);
    var nm = inp ? inp.value.trim() : pendingGuestList[i];
    if (!nm) { showErr("Please enter a name for each guest, or remove the empty seat."); return; }
    names.push(nm);
  }
  var status = pendingConfirmStatus;
  var count = names.length;
  state = "loading"; render();
  api({action:"confirm", studentId:student.id, password:lookupPw, status:status, guests:count, guestNames:names, email:lookupEmail}, function(e, r) {
    if (e || !r || !r.ok) {
      if (r && r.slotFull) {
        errMsg = "This segment just filled up. Please choose another spot below.";
        api({action:"getSlots"}, function(e2, r2) {
          if (!e2 && r2 && r2.ok) { slots = r2.slots; phase = r2.phase; }
          state = "rejoin-pick"; render();
        });
        return;
      }
      state = "guest-select"; showErr((r && r.error) || "Could not save. Please try again."); return;
    }
    student.status = status;
    student.guests = count;
    student.guestNames = names;
    if (r.earlyConfirm) {
      student.earlyConfirm = true;
      var tags = student.tags || '';
      if (tags.indexOf('early-confirm') === -1) student.tags = tags ? tags + '|early-confirm' : 'early-confirm';
    }
    state = "confirm-sent"; render();
  });
}

function calendarLinks(s) {
  var title     = 'Performance Party - ' + s.name;
  var location  = '94 Luquer St, Brooklyn NY 11231';

  var tFull     = TIMES[s.day] && TIMES[s.day][s.seg] ? TIMES[s.day][s.seg] : '';

  var gcUrl = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
    '&text=' + encodeURIComponent(title) +
    '&dates=' + dtStart + '/' + dtEnd +
    '&details=' + encodeURIComponent(desc) +

  var ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'BEGIN:VEVENT',
    'DTSTART:' + dtStart,
    'DTEND:' + dtEnd,

    'DESCRIPTION:' + desc.replace(/,/g, '\\,'),
    'LOCATION:' + location,
    'END:VEVENT',
    'END:VCALENDAR'

      'background:var(--blue);color:#fff;font-size:13px;font-weight:500;' +
      'text-decoration:none;display:block">' +
      '&#128197; Add to Google Calendar</a>' +
    '<a href="' + icsUri + '" download="keylab-performance-party.ics" style="' +
      'flex:1;min-width:120px;text-align:center;padding:9px 14px;border-radius:7px;' +
      'background:var(--bg3);color:var(--text);font-size:13px;font-weight:500;' +

// ── Screen: Cancel confirmed ───────────────────────────────────
// ── Screen: Rejoin slot picker (single select) ────────────────
function rRejoinPick() {
  var DAYS  = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  var SEGS  = {Monday:['Early','Late'],Tuesday:['Early','Late'],Wednesday:['Early','Late'],Thursday:['Early','Late'],Friday:['Single']};
  var PTIMES = {Monday:{Early:'4:00 PM',Late:'5:00 PM'},Tuesday:{Early:'4:00 PM',Late:'5:00 PM'},Wednesday:{Early:'4:00 PM',Late:'5:00 PM'},Thursday:{Early:'4:00 PM',Late:'5:00 PM'},Friday:{Single:'4:00 PM'}};

  var PREF_LABELS = {preferred: '\u2b50 Preferred', available: '\u2713 Available', 'last-resort': '\u2193 Last resort', sibling: '\ud83d\udc6b Sibling'};

  var grid = '<div class="pref-grid">';
  DAYS.forEach(function(day) {
    SEGS[day].forEach(function(seg) {
      var key = day + '_' + seg;
      var slotData = slots && slots[key];
      var isFull = slotData && slotData.isFull;
      var open = slotData ? slotData.open : 0;
      var cls = 'slot-btn' + (isFull ? '' : '');
      grid += '<button class="' + cls + '" ' +
        (isFull ? 'disabled' : 'onclick="doRejoinFromPick(\'' + day + '\',\'' + seg + '\')"') + '>' +
        '<div class="slot-name">' + day + (seg === 'Single' ? '' : ' ' + seg) + '</div>' +
        '<div class="slot-time">' + PTIMES[day][seg] + '</div>' +
        '<div class="slot-avail ' + (isFull ? 'full' : 'open') + '">' + (isFull ? 'Full' : open + ' spot' + (open === 1 ? '' : 's') + ' open') + '</div>' +
        '</button>';
    });
  });
  grid += '</div>';

  var pickTitle = (window._rejoinPickContext === 'cancelled') ? 'Choose a spot' : 'Choose a spot';
  var pickInstructions = (window._rejoinPickContext === 'cancelled')
    ? 'Pick any available spot below. You\'ll be confirmed immediately. The schedule locks June 1st.'
    : 'Select one available spot. You\'ll be confirmed immediately. The schedule locks June 1st.';

  return '<div class="card">' +
    '<div class="card-title">' + pickTitle + '</div>' +
    '<p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.45">' +
    pickInstructions +
    '</p>' +
    errFrag() +
    grid +
    '<p style="font-size:12px;color:var(--text3);margin-top:4px;line-height:1.4">Spots are first come, first served.</p>' +
    '</div>' +
    '<div class="back-row"><button class="btn-nav" onclick="goBack()">&#8592; Back</button></div>';
}

function doGoToRejoinPick() {
  window._rejoinPickContext = 'cancelled';
  state = 'loading'; render();
  api({action:"getSlots"}, function(e, r) {
    if (!e && r && r.ok) { slots = r.slots; phase = r.phase; }
    state = 'rejoin-pick'; errMsg = ''; render();
  });
}

function doRejoinFromPick(toDay, toSeg) {
  errMsg = '';
  state = "loading"; render();
  api({action:"rejoin", studentId:student.id, password:lookupPw, toDay:toDay, toSeg:toSeg, email:lookupEmail}, function(e, r) {
    if (e || !r || !r.ok) {
      if (r && r.slotFull) {
        // Slot just filled — refresh and stay on picker
        api({action:"getSlots"}, function(e2, r2) {
          if (!e2 && r2 && r2.ok) { slots = r2.slots; }
          state = "rejoin-pick";
          errMsg = "That spot just filled up. Please choose another.";
          render();
        });
      } else {
        state = "rejoin-pick"; showErr((r && r.error) || "Could not book. Please try again.");
      }
      return;
    }
    student.day = toDay; student.seg = toSeg; student.status = 'confirmed';
    api({action:"getSlots"}, function(e2, r2) {
      if (!e2 && r2 && r2.ok) { slots = r2.slots; }
      window._swapResult = r.confirmation;
      state = "swap-confirmed"; render();
    });
  });
}

function rCancelConfirmed() {
  var tags = student.tags || '';
  var origMatch = tags.match(/orig:([A-Za-z]+)_([A-Za-z]+)/);
  var origDay = origMatch ? origMatch[1] : null;
  var origSeg = origMatch ? origMatch[2] : null;
  var origKey = origDay && origSeg ? origDay + '_' + origSeg : null;
  var origAvailable = origKey && slots && slots[origKey] && !slots[origKey].isFull;
  var origFull = origKey && slots && slots[origKey] && slots[origKey].isFull;
  var canPickAny = (phase === 'open' || phase === 'locked');

  var rejoinBlock = '';
  if (origAvailable) {
    rejoinBlock =

  } else if (origFull && !canPickAny) {
    rejoinBlock =
      '<div class="notice notice-warn" style="margin-top:16px;margin-bottom:12px"><span class="ni">&#9888;</span><span>Your original segment is now full. Check back on May 4th when self-service scheduling opens, or submit a scheduling request and we\'ll be in touch with an update asap.</span></div>' +

// ── Screen: Preferences ────────────────────────────────────────
function rPreferences() {
  var DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  var SEGS = {Monday:['Early','Late'],Tuesday:['Early','Late'],Wednesday:['Early','Late'],Thursday:['Early','Late'],Friday:['Single']};
  var PTIMES = {Monday:{Early:'4:00 PM',Late:'5:00 PM'},Tuesday:{Early:'4:00 PM',Late:'5:00 PM'},Wednesday:{Early:'4:00 PM',Late:'5:00 PM'},Thursday:{Early:'4:00 PM',Late:'5:00 PM'},Friday:{Single:'4:00 PM'}};
  var PREF_LABELS = {preferred: '\u2b50 Preferred', available: '\u2713 Available', 'last-resort': '\u2193 Last resort', sibling: '\ud83d\udc6b Sibling'};

  // Already-requested segments (from existing request)
  var schedSegs = student.schedRequest || getLatestSchedRequest(student.notes);
  var prefRequested = schedSegs ? schedSegs.map(function(s) { return s.trim().replace(/^[^A-Za-z]+/, '').trim().replace(/ /g, '_'); }) : [];

  // Current spot label logic
  var curKey = (student.day && student.seg) ? student.day + '_' + student.seg : null;
  function curLabel() {
    if (!curKey) return null;
    var slotData = slots && slots[curKey];
    var st = student.status;
    if (st === 'confirmed') return 'confirmed performer spot \u2014 will be released if request is approved';
    if (st === 'confirmed-guest') return 'confirmed non-performer spot \u2014 will be released if request is approved';
    // Unconfirmed
    if (slotData && slotData.isFull) return 'currently full';
    if (slotData && !slotData.isFull) return 'backup spot being held';
    return null;
  }
  var currentLabel = curLabel();

  var grid = '<div class="pref-grid">';
  DAYS.forEach(function(day) {
    SEGS[day].forEach(function(seg) {
      var key = day + '_' + seg;
      var selObj = null;
      for (var si = 0; si < prefSelected.length; si++) { if (prefSelected[si].key === key) { selObj = prefSelected[si]; break; } }
      var isSel = !!selObj;
      var isReq = prefRequested.indexOf(key) > -1;
      var isCur = curKey === key;
      var isDisabled = isCur;
      var cls = 'pref-btn' + (isSel ? ' selected' : '') + (isReq && !isCur ? ' already-requested' : '') + (isCur ? ' current-slot' : '');
      var typeLabel = isSel ? '<div class="pref-time pref-type-label" style="font-weight:600;margin-top:4px">' + (PREF_LABELS[selObj.type] || selObj.type) + '</div>' : '';
      grid += '<button class="' + cls + '" data-prefkey="' + key + '" ' + (isDisabled ? 'disabled style="opacity:0.6;cursor:not-allowed"' : 'onclick="togglePref(\'' + key + '\')"') + '>' +
        '<div class="pref-name">' + day + (seg === 'Single' ? '' : ' ' + seg) + '</div>' +
        '<div class="pref-time">' + PTIMES[day][seg] + '</div>' +
        (isCur && currentLabel ? '<div class="pref-time" style="color:var(--info);margin-top:3px">' + currentLabel + '</div>' : '') +
        (isReq && !isCur ? '<div class="pref-already-label">already requested</div>' : '') +
        typeLabel +
        '</button>';
    });
  });
  grid += '</div>';

  var isInactivePref = student && (student.status === 'cancelled' || student.status === 'not-participating');
  var hasPendingPref = !!(student && (student.schedRequest && student.schedRequest.length) || getLatestSchedRequest(student && student.notes));
  var holdNotice = '';
  if (!isInactivePref && hasPendingPref) {
    // holdNotice suppressed in modify mode — heading already contextualizes the situation
  } else if (!isInactivePref && !hasPendingPref) {
    holdNotice = '';
  }

  var cardTitle = hasPendingPref
    ? 'Update your scheduling request'
    : 'Select one or more segments';

  var cardInstructions = hasPendingPref
    ? '<p style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.45">Your currently requested segments are shown below. Tap any segment to remove it or change its priority. Tap an unselected segment to add it. Tap again to change its priority. When you\'re done, tap Submit to update your existing request \u2014 your previous selections will be permanently overwritten. To cancel your request entirely, deselect all segments and tap Submit.</p>'
    : '<p style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.45">Choose every segment that could work for you. Add any notes below before submitting \u2014 we\'ll do our best to place you in a preferred segment.</p>';

  var priorityNote = (phase === 'pre')
    ? '<div class="notice notice-warn" style="margin-bottom:14px"><span class="ni">&#128197;</span><span>' +
      '<strong>Priority deadline April 30th:</strong> Families who request by April 30th receive priority placement into available spots. Rescheduling is not guaranteed and based on availability.' +
      '</span></div>'
    : '';

  var legend = '<div style="margin-bottom:14px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg3)">' +
    '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">How to use</div>' +
    '<div style="font-size:12px;color:var(--text2);margin-bottom:4px">Tap a segment to select it. Tap again to change its priority status.</div>' +
    '<div style="font-size:12px;color:var(--text2);display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;margin-top:6px">' +
    '<div>\u2b50 <strong>Preferred</strong> \u2014 works great</div>' +
    '<div>\u2713 <strong>Available</strong> \u2014 works</div>' +
    '<div>\u2193 <strong>Last resort</strong> \u2014 if nothing else</div>' +
    '<div>\ud83d\udc6b <strong>Sibling</strong> \u2014 coordinating</div>' +
    '</div>' +
    '</div>';

  return '<div class="card">' +
    '<div class="card-title">' + cardTitle + '</div>' +
    cardInstructions +
    errFrag() +
    priorityNote +
    holdNotice +
    legend +
    grid +
    '<div class="field"><label>Additional notes <span style="font-weight:400;color:var(--text3)">(optional)</span></label>' +
    '<textarea id="pref-note" rows="3" placeholder="Any scheduling conflicts, sibling arrangements, or other notes." style="resize:vertical"></textarea></div>' +
    '<button class="btn-primary" id="pref-btn" onclick="doSubmitPreferences()">Submit preferences</button>' +
    '</div>' +
    '<div class="back-row"><button class="btn-nav" onclick="goBack()">&#8592; Back</button></div>';
}

    '<ul style="margin:0;padding-left:18px;font-size:13px;color:var(--text2);line-height:1.6">' + prevList + '</ul></div>' +
    '<div style="margin-bottom:4px"><div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Your updated request</div>' +
    '<ul style="margin:0;padding-left:18px;font-size:13px;color:var(--text2);line-height:1.6">' + updList + '</ul></div>' +
    confirmCopy +
    '<div style="display:flex;gap:10px;margin-top:16px">' +
    '<button class="btn-secondary" onclick="state=\'preferences\';render()">Go back</button>' +

// ── Screen: Swap ───────────────────────────────────────────────
function rSwap() {
  var DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  var SEGS = {Monday:['Early','Late'],Tuesday:['Early','Late'],Wednesday:['Early','Late'],Thursday:['Early','Late'],Friday:['Single']};
  var STIMES = {Monday:{Early:'4:00 PM',Late:'5:00 PM'},Tuesday:{Early:'4:00 PM',Late:'5:00 PM'},Wednesday:{Early:'4:00 PM',Late:'5:00 PM'},Thursday:{Early:'4:00 PM',Late:'5:00 PM'},Friday:{Single:'4:00 PM'}};

  var origDay = window._rejoinOrigDay;
  var origSeg = window._rejoinOrigSeg;
  var origFull = origDay && origSeg && slots && slots[origDay + '_' + origSeg] && slots[origDay + '_' + origSeg].isFull;

  var grid = '<div class="swap-grid">';
  DAYS.forEach(function(day) {
    SEGS[day].forEach(function(seg) {
      var key = day + '_' + seg;
      var isCur = student.day === day && student.seg === seg;
      var isOrig = origDay === day && origSeg === seg;
      var slotInfo = slots && slots[key];
      var isFull = slotInfo ? slotInfo.isFull : false;
      var openCount = slotInfo ? slotInfo.open : 0;
      var cls = 'slot-btn' + (isCur ? ' current' : '') + (isOrig ? ' is-orig' : '');
      var availText = isCur ? 'Current segment' : (isFull ? 'Full' : openCount + ' spot' + (openCount === 1 ? '' : 's') + ' available');
      var availCls = (isFull && !isCur) ? 'full' : 'open';
      grid += '<button class="' + cls + '" onclick="doPickSwap(\'' + day + '\',\'' + seg + '\')"' + ((isFull && !isCur) ? ' disabled' : '') + '>' +
        '<div class="slot-name">' + day + (seg === 'Single' ? '' : ' ' + seg) + '</div>' +
        '<div class="slot-time">' + STIMES[day][seg] + '</div>' +
        '<div class="slot-avail ' + availCls + '">' + availText + '</div>' +
        '</button>';
    });
  });
  grid += '</div>';

  return '<div class="card">' +
    '<div class="card-title">Reschedule</div>' +
    (origFull
      ? '<div class="notice notice-warn"><span class="ni">&#9888;</span><span>Your original segment <strong>' + origDay + ' ' + origSeg + '</strong> is full. Choose another available slot below.</span></div>'
      : (origDay ? '<div class="notice notice-info"><span class="ni">&#128260;</span><span>Your original segment <strong>' + origDay + ' ' + origSeg + '</strong> has space \u2014 it\'s highlighted below.</span></div>' : '')) +
    errFrag() +
    grid +
    '<p style="font-size:12px;color:var(--text3);margin-top:4px;line-height:1.4">Spots are first come, first served.</p>' +
    '</div>' +
    '<div class="back-row"><button class="btn-nav" onclick="goBack()">&#8592; Back</button></div>';
}

  } else if (phase === 'priority') {

  } else if (phase === 'pre') {

function toggleInfo(id) {
  var btn  = document.getElementById("btn-" + id);
  var body = document.getElementById("body-" + id);
  if (!body) return;
  var open = body.classList.contains("open");
  body.classList.toggle("open", !open);
  if (btn) btn.classList.toggle("open", !open);
}

function fmtSchedSegment(s) {
  var TYPE_ICONS = {preferred: '\u2b50', available: '\u2713', 'last-resort': '\u2193', sibling: '\ud83d\udc6b', 'admin-hold': '\ud83d\udccc', requested: ''};
  var typeMatch = s.trim().match(/\[([^\]]+)\]$/);
  var type = typeMatch ? typeMatch[1] : '';
  var seg = s.trim().replace(/\s*\[[^\]]+\]$/, '').trim().replace(/_/g, ' ');
  var icon = TYPE_ICONS[type] || '';
  return icon ? icon + ' ' + seg : seg;
}

function getLatestSchedRequest(notes) {
  if (!notes || !notes.trim()) return null;
  var chunks = notes.trim().split(/\n\n+/);
  for (var i = chunks.length - 1; i >= 0; i--) {
    var chunk = chunks[i].trim();
    // Mirror Code.gs: if the most recent relevant entry is a withdrawal, stop
    if (/^\[([^\]]+)\]\s+RESOLVED\s+—/.test(chunk) && /scheduling request withdrawn/i.test(chunk)) {
      return null;
    }
    var m = chunk.match(/^\[([^\]]+)\]\s+SCHEDULING REQUEST\s+—\s+([\s\S]*)$/);
    if (m) {
      var body = m[2].trim();
      var slotMatch = body.match(/Preferred slots:\s*([^.]+)/);
      if (slotMatch) {
        return slotMatch[1].trim().split(',').map(function(s) {
          return fmtSchedSegment(s);
        });
      }
    }
  }
  return null;
}

function doModifyRequest() {
  var schedSegs = student.schedRequest || getLatestSchedRequest(student.notes);
  if (schedSegs && schedSegs.length) {
    prefSelected = schedSegs.map(function(s) {
      var clean = s.trim().replace(/^[^A-Za-z]+/, '').trim();
      return {key: clean.replace(/ /g, '_'), type: 'preferred'};
    });
  } else {
    prefSelected = [];
  }
  state = 'preferences'; errMsg = ''; render();
}
