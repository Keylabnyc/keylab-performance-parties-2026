.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:.5px solid var(--border)}
.brand{font-family:"DM Mono",monospace;font-size:13px;letter-spacing:.08em;color:var(--acc)}
.sub{font-size:11px;color:var(--text3);margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.tab{padding:5px 12px;border-radius:var(--r);font-size:12px;cursor:pointer;border:.5px solid transparent;background:transparent;color:var(--text2);font-family:"DM Sans",sans-serif;transition:all .15s}
.tab:hover{background:var(--bg2);color:var(--text)}.tab.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.msg{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:1rem;border:.5px solid}
.ms{background:var(--gbg);color:var(--gt);border-color:var(--green)}
.me{background:var(--rbg);color:var(--rt);border-color:var(--red)}
.mi{background:var(--bbg);color:var(--bt);border-color:var(--blue)}
.stats{display:grid;gap:8px;margin-bottom:1.5rem}
.stat{background:var(--bg2);border-radius:var(--r);padding:.9rem 1rem;border:.5px solid var(--border)}
.sn{font-size:26px;font-weight:300;font-family:"DM Mono",monospace}
.sl{font-size:12px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.dr{margin-bottom:1.25rem}
.dl{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}
.ds{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ds.one{grid-template-columns:1fr;max-width:55%}
.sc{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rl);padding:.9rem}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.st{font-size:13px;font-weight:500;font-family:"DM Mono",monospace}
.bdg{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.bo{background:var(--gbg);color:var(--gt)}.bf{background:var(--rbg);color:var(--rt)}.bh{background:var(--abg);color:var(--at)}
.ss{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:.5rem}
.sc2{background:var(--bg3);border-radius:6px;padding:4px 6px;text-align:center}
.sl2{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.sv{font-size:12px;font-weight:500;font-family:"DM Mono",monospace}
.vg{color:var(--gt)}.vw{color:var(--at)}.vn{color:var(--text3)}
.pl{list-style:none;margin-top:.4rem}
.pi{padding:3px 0;border-bottom:.5px solid var(--border)}.pi:last-child{border-bottom:none}
.pr{display:flex;align-items:center;gap:4px;min-width:0}
.pn{font-family:"DM Mono",monospace;font-size:11px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pt{font-size:9px;color:var(--text3);display:block}
.eb{font-size:10px;cursor:pointer;background:none;border:.5px solid var(--border2);padding:1px 5px;border-radius:4px;color:var(--text3);flex-shrink:0}
.eb:hover{background:var(--bg3);color:var(--text)}.eb:disabled{opacity:.3;cursor:default}
.sb{font-size:10px;padding:2px 6px;border-radius:10px;cursor:pointer;border:none;font-family:"DM Sans",sans-serif;flex-shrink:0;white-space:nowrap}
.su{background:#222;color:#888}.sc3{background:var(--gbg);color:var(--gt)}.scg{background:var(--bbg);color:var(--bt)}.snp{background:#1a1a1a;color:#555}.scc{background:var(--rbg);color:var(--rt)}
.mv{font-size:10px;padding:2px 4px;border:.5px solid var(--border2);border-radius:4px;background:var(--bg3);color:var(--text2);width:65px;flex-shrink:0;font-family:"DM Sans",sans-serif}
.nh{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:5px 0 2px}
.card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rl);padding:1.1rem 1.25rem;margin-bottom:1rem;max-width:520px}
.lbl{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:90px;margin-bottom:.5rem}
.fl{font-size:12px;color:var(--text3)}.fr{display:flex;gap:8px;flex-wrap:wrap}
input[type="checkbox"]{background:none;border:none;padding:0;width:auto;accent-color:var(--acc)}
input:not([type="checkbox"]),select{font-family:"DM Sans",sans-serif;font-size:13px;background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);color:var(--text);padding:6px 9px;width:100%;outline:none}
input:not([type="checkbox"]):focus,select:focus{border-color:var(--acc)}
.btn{padding:6px 13px;border-radius:var(--r);font-size:12px;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--text2);font-family:"DM Sans",sans-serif;transition:all .15s}
.btn:hover{background:var(--bg3);color:var(--text)}
.btnp{background:var(--acc);color:#111;border-color:var(--acc);font-weight:500}.btnp:hover{opacity:.88}
.spin{display:inline-block;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.login{max-width:320px;margin:4rem auto;text-align:center}
.lt{font-family:"DM Mono",monospace;font-size:16px;color:var(--acc);margin-bottom:1.5rem;letter-spacing:.05em}
.ordnum{font-size:10px;color:var(--text3);min-width:16px;text-align:right;font-family:"DM Mono",monospace;flex-shrink:0;font-weight:500}
.gcount{font-size:11px;color:var(--text2);min-width:22px;text-align:center;font-family:"DM Mono",monospace;flex-shrink:0}

/* ── Notes pill (sole trigger, green/amber/grey states) ── */
.notes-pill{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:20px;
  flex-shrink:0;letter-spacing:.02em;
  white-space:nowrap;cursor:pointer;border:none;
  font-family:"DM Sans",sans-serif;
  line-height:1.4;
}
.notes-pill span.pi{font-size:9px;line-height:1;}
.notes-pill.amber{background:var(--abg);color:var(--at);}
.notes-pill.green{background:var(--gbg);color:var(--gt);}
.notes-pill.grey{background:var(--bg3);color:var(--text3);}
.notes-pill:hover{opacity:.82;}

/* ── Messages panel ── */
.mpanel{
  margin-top:5px;
  padding:8px 10px;
  background:var(--bg);
  border:.5px solid var(--border2);
  border-radius:6px;
}
.mpanel-section-label{
  font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);
  padding:3px 0 6px;font-weight:500;
}
.note-entry{
  padding:5px 0;
  border-bottom:.5px solid var(--border);
}
.note-entry:last-child{border-bottom:none}
.note-entry-ts{
  font-size:9px;color:var(--text3);font-family:"DM Mono",monospace;display:block;margin-bottom:2px;
}
.note-entry-type{
  display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:10px;
  margin-right:4px;text-transform:uppercase;letter-spacing:.04em;
}
.nt-MESSAGE{background:#2a1d08;color:#f0a830;}
.nt-CANCELLATION{background:#2a0f0f;color:#f07070;}
.nt-SCHEDULING{background:#0d1e30;color:#6aadee;}
.nt-RESCHEDULE{background:#0d1e30;color:#6aadee;}
.nt-CONFIRMED{background:#0d2a1d;color:#4fd49a;}
.nt-ADMIN{background:#1e1e2a;color:#a090d0;}
.nt-OTHER{background:#222;color:#888;}
.note-entry-body{font-size:11px;color:var(--text2);line-height:1.45;word-break:break-word;}
.mpanel-divider{border:none;border-top:.5px solid var(--border2);margin:8px 0;}
.admin-note-ta{
  width:100%;font-size:11px;font-family:"DM Mono",monospace;
  background:var(--bg3);border:.5px solid var(--border2);border-radius:4px;
  color:var(--text);padding:5px 7px;resize:vertical;min-height:55px;max-height:180px;
  outline:none;
}
.admin-note-ta:focus{border-color:var(--acc)}
.note-expand{font-size:9px;cursor:pointer;background:none;border:.5px solid var(--border2);padding:1px 5px;border-radius:3px;color:var(--at);font-family:"DM Sans",sans-serif}
.note-expand:hover{background:var(--abg)}
.read-toggle{font-size:9px;cursor:pointer;background:none;border:none;color:var(--text3);font-family:"DM Sans",sans-serif;padding:0;text-decoration:underline;text-underline-offset:1px;}
.read-toggle:hover{color:var(--text2);}
/* Email family section */
.email-section-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:3px 0 6px;font-weight:500;}
.email-input{font-size:11px;font-family:"DM Mono",monospace;background:var(--bg3);border:.5px solid var(--border2);border-radius:4px;color:var(--text);padding:4px 7px;width:100%;outline:none;margin-bottom:4px;}
.email-input:focus{border-color:var(--acc)}
.email-ta{width:100%;font-size:11px;font-family:"DM Mono",monospace;background:var(--bg3);border:.5px solid var(--border2);border-radius:4px;color:var(--text);padding:5px 7px;resize:vertical;min-height:55px;max-height:150px;outline:none;margin-bottom:4px;}
.email-ta:focus{border-color:var(--acc)}
.email-send-btn{font-size:9px;cursor:pointer;background:var(--bbg);border:.5px solid var(--blue);padding:2px 8px;border-radius:3px;color:var(--bt);font-family:"DM Sans",sans-serif;}
.email-send-btn:hover{opacity:.82;}
.email-feedback{font-size:10px;margin-top:4px;display:inline-block;}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <div>
      <div class="brand">KEYLAB ADMIN &mdash; PERFORMANCE PARTIES 2026</div>
      <div class="sub">Jun 15&ndash;19 &middot; 94 Luquer St, Brooklyn</div>
    </div>
    <div id="nr"></div>
  </div>
  <div id="root"></div>
</div>

<script>
var PW = "admin", MP = 10, DD = 4;
var DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
var SEGS = {Monday:["Early","Late"],Tuesday:["Early","Late"],Wednesday:["Early","Late"],Thursday:["Early","Late"],Friday:["Single"]};
var TIMES = {Monday:{Early:"4:00 PM",Late:"5:00 PM"},Tuesday:{Early:"4:00 PM",Late:"5:00 PM"},Wednesday:{Early:"4:00 PM",Late:"5:00 PM"},Thursday:{Early:"4:00 PM",Late:"5:00 PM"},Friday:{Single:"4:00 PM"}};
var STS = ["unconfirmed","confirmed","confirmed-guest","cancelled","not-participating"];
var STLBL = {unconfirmed:"Unconfirmed",confirmed:"CP","confirmed-guest":"CNP","cancelled":"Cancelled","not-participating":"Not Attending"};
var STFULL = {unconfirmed:"Unconfirmed",confirmed:"CP \u2014 Confirmed Performer","confirmed-guest":"CNP \u2014 Confirmed Non-Performer","cancelled":"Cancelled","not-participating":"Not Attending"};
var STCLS = {unconfirmed:"su",confirmed:"sc3","confirmed-guest":"scg","cancelled":"scc","not-participating":"snp"};
var authed = false, roster = [], msg = {m:"",t:""}, fday = "all", fst = "all", ftags = [], loading = false, saving = false, atab = "roster";

function api(p, cb) {
  google.script.run
    .withSuccessHandler(function(r) { try { cb(null, JSON.parse(r)); } catch(e) { cb(e); } })
    .withFailureHandler(function(e) { cb(e); })
    .callApi(JSON.stringify(p));
}

function sk(d, s) { return d + "_" + s; }
function slbl(k) { var p = k.split("_"); return p[1] === "Single" ? p[0] : p[0] + " " + p[1]; }
function allK() { var r = []; DAYS.forEach(function(d) { SEGS[d].forEach(function(s) { r.push(sk(d,s)); }); }); return r; }
function segSt(k) { var p = k.split("_"); var d = p[0], s = p.slice(1).join("_"); return roster.filter(function(x) { return x.day === d && x.seg === s; }); }
function fmtTime(v) {
  if (!v) return '';
  // If it's already a clean time string like "3:00 PM", return as-is
  if (/^\d{1,2}:\d{2}\s*(AM|PM)$/i.test(v.trim())) return v.trim();
  // If it looks like a date string, parse and extract the time
  if (v.indexOf('GMT') > -1 || v.indexOf('1899') > -1 || v.indexOf('196') > -1) {
    var d = new Date(v);
    if (!isNaN(d.getTime())) {
      var h = d.getHours(), m = d.getMinutes();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12; if (!h) h = 12;
      return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
    }
  }
  return v;
}

function lfmt(n) { var p = n.trim().split(/\s+/); return p.length < 2 ? n : p[p.length-1] + ", " + p.slice(0,-1).join(" "); }
function fmt(m) { var h = Math.floor(m/60), mn = m%60; return h > 0 ? h + "h " + (mn > 0 ? mn + "m" : "") : mn + "m"; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Note parsing ──────────────────────────────────────────────
function parseNotes(notesStr) {
  if (!notesStr || !notesStr.trim()) return [];
  var entries = [];
  var raw = notesStr.trim().split(/\n\n+/);
  raw.forEach(function(chunk) {
    chunk = chunk.trim();
    if (!chunk) return;
    var m = chunk.match(/^\[([^\]]+)\]\s+(.+?)\s+\u2014\s+([\s\S]*)$/);
    if (m) {
      entries.push({ts: m[1].trim(), type: m[2].trim(), body: m[3].trim()});
    } else {
      entries.push({ts: '', type: 'OTHER', body: chunk});
    }
  });
  // Return chronological (oldest first) — reverse() gives newest first
  entries.reverse();
  return entries;
}

function hasAnyNotes(notesStr) {
  return parseNotes(notesStr).length > 0;
}

function countAllNotes(notesStr) {
  return parseNotes(notesStr).length;
}

// Returns 'green', 'amber', or 'grey'
// green  = unread MESSAGE or UNREAD marker
// amber  = has notes, most recent status marker is READ
// grey   = no notes, or most recent marker is RESOLVED
function pillState(notesStr) {
  var entries = parseNotes(notesStr);
  if (!entries.length) return 'grey';
  for (var i = 0; i < entries.length; i++) {
    var t = entries[i].type;
    if (t === 'MESSAGE')  return 'green';
    if (t === 'UNREAD')   return 'green';
    if (t === 'READ')     return 'amber';
    if (t === 'RESOLVED') return 'grey';
  }
  return 'amber'; // has notes but no status marker — treat as amber
}

function pillIsGreen(notesStr) {
  return pillState(notesStr) === 'green';
}

function noteTypeClass(type) {
  if (type === 'MESSAGE') return 'nt-MESSAGE';
  if (type === 'CANCELLATION') return 'nt-CANCELLATION';
  if (type.indexOf('SCHEDULING') > -1) return 'nt-SCHEDULING';
  if (type === 'RESCHEDULE') return 'nt-RESCHEDULE';
  if (type === 'CONFIRMED') return 'nt-CONFIRMED';
  if (type === 'ADMIN NOTE') return 'nt-ADMIN';
  return 'nt-OTHER';
}

function loadRoster() {
  loading = true; render();
  api({action:"getTemplates",password:PW}, function(e, r) {
    if (!e && r && r.ok && r.templates) {
      Object.keys(r.templates).forEach(function(k) {
        if (COMM_TEMPLATES[k]) {
          // Update existing template
          COMM_TEMPLATES[k].subject = r.templates[k].subject;
          COMM_TEMPLATES[k].body    = r.templates[k].body;
        } else {
          // Add new custom template created in admin UI
          COMM_TEMPLATES[k] = {
            label:         r.templates[k].label || k,
            defaultStatus: r.templates[k].defaultStatus || "all-active",
            subject:       r.templates[k].subject || "",
            body:          r.templates[k].body || "",
            custom:        true
          };
        }
      });
    }
    api({action:"getRoster",password:PW}, function(e2, r2) {
      if (e2 || !r2 || !r2.ok) { msg = {m:(r2&&r2.error)||"Failed to load.",t:"e"}; }
      else { roster = r2.roster || []; msg = {m:"",t:""}; }
      loading = false; render();
    });
  });
}

function pushRoster(cb) {
  saving = true; render();
  api({action:"setRoster",password:PW,roster:roster}, function(e, r) {
    saving = false;
    if (e || !r || !r.ok) { msg = {m:(r&&r.error)||"Save failed.",t:"e"}; }
    else { msg = {m:"\u2705 Saved to Sheet.",t:"s"}; }
    render(); if (cb) cb();
  });
}

function setSt(id, v) {
  var s = roster.find(function(x) { return x.id === id; }); if (!s) return;
  // Admin-initiated cancellations are always "not-participating" (Admin Cancel).
  // "cancelled" (Client Cancel) is only set by families via the family page.
  if (v === 'cancelled') v = 'not-participating';
  s.status = v; pushRoster();
}

function setG(id, d) {
  var s = roster.find(function(x) { return x.id === id; });
  if (!s) return;
  s.guests = Math.max(0, Math.min(4, (parseInt(s.guests)||0) + d));
  pushRoster();
}

function movSt(id, k) {
  if (!k) return;
  var s = roster.find(function(x) { return x.id === id; }); if (!s) return;
  if (k === "unassigned") {
    s.day = ""; s.seg = ""; s.status = "not-participating";
    msg = {m: s.name + " moved to Unassigned.", t:"s"};
  } else {
    var p = k.split("_"); s.day = p[0]; s.seg = p.slice(1).join("_");
    if (s.status === "not-participating") s.status = "unconfirmed";
    msg = {m: s.name + " moved to " + slbl(k) + ".", t:"s"};
  }
  pushRoster();
}

function rmSt(id) {
  if (!confirm("Remove this student from the roster?")) return;
  var i = roster.findIndex(function(x) { return x.id === id; }); if (i === -1) return;
  var n = roster[i].name; roster.splice(i, 1);
  msg = {m: n + " removed.", t:"i"}; pushRoster();
}

function moOrd(id, k, dir) {
  var ac = segSt(k).filter(function(s) { return s.status === "confirmed" || s.status === "unconfirmed"; });
  var i = ac.findIndex(function(s) { return s.id === id; }); if (i === -1) return;
  var j = i + dir; if (j < 0 || j >= ac.length) return;
  var ri = roster.findIndex(function(s) { return s.id === ac[i].id; });
  var rj = roster.findIndex(function(s) { return s.id === ac[j].id; });
  var t = roster[ri]; roster[ri] = roster[rj]; roster[rj] = t;
  pushRoster();
}

function doLogin() {
  var pw = (document.getElementById("apw") || {}).value || "";
  if (pw === PW) {
    var remember = (document.getElementById("aremember") || {}).checked;
    if (remember) { try { localStorage.setItem("kl_admin_pw", pw); } catch(e) {} }
    else { try { localStorage.removeItem("kl_admin_pw"); } catch(e) {} }
    authed = true; loadRoster();
  } else { var e = document.getElementById("lerr"); if (e) e.textContent = "Incorrect password."; }
}

function tryAutoLogin() {
  try {
    var saved = localStorage.getItem("kl_admin_pw");
    if (saved && saved === PW) { authed = true; loadRoster(); return; }
  } catch(e) {}
  render();
}

function updSeg() {
  var d = (document.getElementById("ad") || {}).value;
  var ss = document.getElementById("as"); if (!ss) return;
  if (d === "Unassigned") { ss.style.display = "none"; ss.innerHTML = '<option value="">—</option>'; return; }
  ss.style.display = "";
  ss.innerHTML = d === "Friday"
    ? '<option value="Single">Single (4pm)</option>'
    : '<option value="Early">Early (4pm)</option><option value="Late">Late (5pm)</option>';
}

function doAdd() {
  var n = ((document.getElementById("an") || {}).value || "").trim();
  if (!n) { msg = {m:"Name required.",t:"e"}; render(); return; }
  var t  = ((document.getElementById("at") || {}).value || "").trim();
  var d  = (document.getElementById("ad") || {}).value || "Monday";
  var s  = (document.getElementById("as") || {}).value || "Early";
  var g  = parseInt(((document.getElementById("ag") || {}).value) || 0);
  var lt = ((document.getElementById("alt") || {}).value || "").trim();
  var isUnassigned = d === "Unassigned";
  roster.push({id:"u_"+Date.now(),name:n,teacher:t,
    day: isUnassigned ? "" : d,
    seg: isUnassigned ? "" : s,
    guests:g,dur:DD,
    status: isUnassigned ? "not-participating" : "unconfirmed",
    tags: isUnassigned ? "saturday" : [],
    notes:"",lessonTime:lt,order:roster.length,email:""});
  msg = {m: n + " added.", t:"s"}; pushRoster();
}

// ── Notes panel toggle ─────────────────────────────────────────
function toggleNotesPanel(id) {
  var panel = document.getElementById("mp-" + id);
  if (!panel) return;
  var isOpen = panel.style.display !== "none";
  if (!isOpen) {
    var s = roster.find(function(x) { return x.id === id; });
    var notesTrimmed = s ? (s.notes || '').trim() : '';
    var hasMsg = parseNotes(notesTrimmed).some(function(e) { return e.type === 'MESSAGE'; });
    var hasNotes = hasAnyNotes(notesTrimmed);
    var pill = document.getElementById("pill-" + id);
    var tog = document.getElementById("readtog-" + id);
    // Only fire markRead if there are actual MESSAGE notes to mark
    if (hasMsg) {
      api({action:"markRead",password:PW,studentId:id,mark:"read"}, function(){
        api({action:"getRoster",password:PW}, function(e, r) {
          if (!e && r && r.ok) { roster = r.roster || []; }
        });
      });
      if (pill) {
        pill.className = "notes-pill amber";
        pill.innerHTML = "● " + countAllNotes(notesTrimmed) + (countAllNotes(notesTrimmed) === 1 ? " note" : " notes");
      }
      if (tog) tog.textContent = "Mark as unread";
    } else {
      // No messages — pill stays grey (no notes) or amber (notes but no MSG)
      if (pill) {
        var pillCls = hasNotes ? 'amber' : 'grey';
        var pillLabel = hasNotes ? ('● ' + countAllNotes(notesTrimmed) + (countAllNotes(notesTrimmed) === 1 ? ' note' : ' notes')) : '● notes';
        pill.className = "notes-pill " + pillCls;
        pill.innerHTML = pillLabel;
      }
      if (tog) tog.textContent = hasNotes ? "Mark as unread" : "";
    }
  }
  panel.style.display = isOpen ? "none" : "block";
}

function deleteNote(id, displayIdx) {
  // parseNotes returns newest-first (reversed). To delete by display index,
  // get the entries array, find the entry at displayIdx, reconstruct its raw chunk,
  // then remove that chunk from the raw notes string.
  var s = roster.find(function(x) { return x.id === id; });
  if (!s) return;
  var notesTrimmed = (s.notes || '').trim();
  var entries = parseNotes(notesTrimmed); // newest-first
  var entry = entries[displayIdx];
  if (!entry) return;
  // Reconstruct the raw chunk to match against the split segments
  var rawChunk = entry.ts
    ? '[' + entry.ts + '] ' + entry.type + ' \u2014 ' + entry.body
    : entry.body;
  // Split the raw notes, filter out the matching chunk, rejoin
  var rawChunks = notesTrimmed.split(/\n\n+/);
  var filtered = rawChunks.filter(function(c) { return c.trim() !== rawChunk.trim(); });
  s.notes = filtered.join('\n\n');
  refreshNotesPanel(id);
}

function refreshNotesPanel(id) {
  // Use in-memory roster — already updated before this is called.
  // Push to sheet, then redraw the panel from memory (no getRoster re-fetch
  // which could race against the sheet write and return stale data).
  var fresh = roster.find(function(x) { return x.id === id; });
  if (fresh) {
    var panel = document.getElementById("mp-" + id);
    if (panel) {
      var wasOpen = panel.style.display !== "none";
      var tmp = document.createElement("div");
      tmp.innerHTML = buildNotesPanel(fresh);
      var newPanel = tmp.firstChild;
      if (newPanel) {
        if (wasOpen) newPanel.style.display = "block";
        panel.parentNode.replaceChild(newPanel, panel);
      }
    }
    // Also update the pill label in the student row
    var notesTrimmed = (fresh.notes || '').trim();
    var pState = pillState(notesTrimmed);
    var noteCount = countAllNotes(notesTrimmed);
    var hasNotes = hasAnyNotes(notesTrimmed);
    var pill = document.getElementById("pill-" + id);

        : (hasNotes ? ('● ' + noteCount + (noteCount === 1 ? ' note' : ' notes')) : '● notes');

    var gcEl = document.getElementById("gc-" + id);
    if (gcEl) gcEl.textContent = (parseInt(fresh.guests) || 0) + 'g';

}

// Parse guest names from a student's notes (most recent GUEST NAMES entry)
function getStoredGuestNames(notes) {
  var notesTrimmed = (notes || '').trim();
  if (!notesTrimmed) return [];
  var chunks = notesTrimmed.split(/\n\n+/);
  for (var i = chunks.length - 1; i >= 0; i--) {
    var m = chunks[i].trim().match(/^\[([^\]]+)\]\s+GUEST NAMES\s+\u2014\s+([\s\S]*)$/);
    if (m) {
      return m[2].trim() ? m[2].trim().split('|').map(function(n) { return n.trim(); }).filter(Boolean) : [];
    }
  }
  return [];
}

// Returns {segKey: type} map from the most recent active SCHEDULING REQUEST note
function getSchedRequestTypes(notes) {
  var notesTrimmed = (notes || '').trim();
  if (!notesTrimmed) return {};
  var chunks = notesTrimmed.split(/\n\n+/);
  var lastSchedIdx = -1;
  for (var ci = 0; ci < chunks.length; ci++) {
    if (/^\[([^\]]+)\]\s+SCHEDULING REQUEST\s+\u2014/.test(chunks[ci].trim())) lastSchedIdx = ci;
  }
  if (lastSchedIdx < 0) return {};
  // Check for resolution after the request
  for (var ri = lastSchedIdx + 1; ri < chunks.length; ri++) {
    if (/^\[([^\]]+)\]\s+(RESOLVED|CONFIRMED|CANCELLATION|RESCHEDULE)\s+\u2014/.test(chunks[ri].trim())) return {};
  }
  var m = chunks[lastSchedIdx].trim().match(/^\[([^\]]+)\]\s+SCHEDULING REQUEST\s+\u2014\s+([\s\S]*)$/);
  if (!m) return {};
  var slotMatch = m[2].trim().match(/Preferred slots:\s*([^.]+)/);
  if (!slotMatch) return {};
  var result = {};
  slotMatch[1].trim().split(',').forEach(function(s) {
    var typeMatch = s.trim().match(/\[([^\]]+)\]$/);
    var type = typeMatch ? typeMatch[1] : 'requested';
    var segStr = s.trim().replace(/\s*\[[^\]]+\]$/, '').trim();
    var segKey = segStr.replace(/ /g, '_');
    result[segKey] = type;
  });
  return result;
}

// Rewrite type for one segment in the most recent SCHEDULING REQUEST note
function updateSchedRequestType(studentId, segKey, newType) {
  var s = roster.find(function(x) { return x.id === studentId; });
  if (!s) return;
  var notesTrimmed = (s.notes || '').trim();
  var chunks = notesTrimmed ? notesTrimmed.split(/\n\n+/) : [];
  var lastSchedIdx = -1;
  for (var ci = 0; ci < chunks.length; ci++) {
    if (/^\[([^\]]+)\]\s+SCHEDULING REQUEST\s+\u2014/.test(chunks[ci].trim())) lastSchedIdx = ci;
  }
  if (lastSchedIdx < 0) return;
  var chunk = chunks[lastSchedIdx];
  var m = chunk.trim().match(/^(\[[^\]]+\]\s+SCHEDULING REQUEST\s+\u2014\s+Preferred slots:\s*)([^.]+)([\s\S]*)$/);
  if (!m) return;
  var segDay = segKey.split('_')[0], segSeg = segKey.split('_').slice(1).join('_');
  var segStr = segDay + ' ' + segSeg;
  var newSlots = m[2].trim().split(',').map(function(part) {
    var clean = part.trim().replace(/\s*\[[^\]]+\]$/, '').trim();
    if (clean === segStr || clean.replace(/ /g,'_') === segKey) {
      return clean + ' [' + newType + ']';
    }
    return part.trim();
  }).join(', ');
  chunks[lastSchedIdx] = chunk.trim().replace(/^(\[[^\]]+\]\s+SCHEDULING REQUEST\s+\u2014\s+Preferred slots:\s*)([^.]+)/, '$1' + newSlots);
  s.notes = chunks.join('\n\n');
  msg = {m: s.name + ' request updated.', t: 's'};
  pushRoster();
}

// Add an admin hold (SCHEDULING REQUEST note) for a roster student
function addAdminHold(studentId, segKey, type, note) {
  var s = roster.find(function(x) { return x.id === studentId; });
  if (!s) return;
  var segDay = segKey.split('_')[0], segSeg = segKey.split('_').slice(1).join('_');
  var segStr = segDay + ' ' + segSeg;
  var now = new Date();
  var pad = function(n) { return n < 10 ? '0' + n : String(n); };
  var h = now.getHours(), ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if (!h) h = 12;
  var ts = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + ' ' + pad(h) + ':' + pad(now.getMinutes()) + ' ' + ampm;

  // Check if there's already an active SCHEDULING REQUEST note — if so, append to it
  var notesTrimmed = (s.notes || '').trim();
  var chunks = notesTrimmed ? notesTrimmed.split(/\n\n+/) : [];
  var lastSchedIdx = -1;
  for (var ci = 0; ci < chunks.length; ci++) {
    if (/^\[([^\]]+)\]\s+SCHEDULING REQUEST\s+\u2014/.test(chunks[ci].trim())) lastSchedIdx = ci;
  }
  // Check if the most recent scheduling request is still active (no resolution after it)
  var isActive = false;
  if (lastSchedIdx >= 0) {
    isActive = true;
    for (var ri = lastSchedIdx + 1; ri < chunks.length; ri++) {
      if (/^\[([^\]]+)\]\s+(RESOLVED|CONFIRMED|CANCELLATION|RESCHEDULE)\s+\u2014/.test(chunks[ri].trim())) {
        isActive = false; break;
      }
    }
  }

  if (isActive) {
    // Append new segment to the existing SCHEDULING REQUEST note
    var chunk = chunks[lastSchedIdx];
    var slotMatch = chunk.match(/^(\[[^\]]+\]\s+SCHEDULING REQUEST\s+\u2014\s+Preferred slots:\s*)([^.]+)(.*)/);
    if (slotMatch) {
      // Check if this segment is already listed — if so, just update its type
      var existingSlots = slotMatch[2].trim().split(',').map(function(p) { return p.trim(); });
      var found = false;
      existingSlots = existingSlots.map(function(part) {
        var clean = part.replace(/\s*\[[^\]]+\]$/, '').trim();
        if (clean === segStr || clean.replace(/ /g, '_') === segKey) {
          found = true;
          return clean + ' [' + type + ']';
        }
        return part;
      });
      if (!found) existingSlots.push(segStr + ' [' + type + ']');
      chunks[lastSchedIdx] = slotMatch[1] + existingSlots.join(', ') + slotMatch[3];
      s.notes = chunks.join('\n\n');
      msg = {m: 'Hold added for ' + s.name + '.', t: 's'};
      pushRoster();
      return;
    }
  }

  // No active request — create a new SCHEDULING REQUEST note
  var content = 'Preferred slots: ' + segStr + ' [' + type + ']' + (note ? '. Notes: ' + note : '');
  var entry = '[' + ts + '] SCHEDULING REQUEST \u2014 ' + content;
  s.notes = s.notes ? s.notes + '\n\n' + entry : entry;
  msg = {m: 'Hold added for ' + s.name + '.', t: 's'};
  pushRoster();
}

  if (esegEl && esegEl.value) { s.seg = esegEl.value; }

  if (edayEl && edayEl.value && s.status === 'not-participating') { s.status = 'unconfirmed'; }

  s.teacherFull = teaf !== undefined ? teaf.trim() : (s.teacherFull || '');

  // Guest count + names

    var newGuestCount = Math.max(0, Math.min(3, parseInt(gcEl.value) || 0));

    var gn3 = ((document.getElementById("egn3-" + id) || {}).value || '').trim();
    var newNames = [gn1, gn2, gn3].slice(0, newGuestCount).filter(Boolean);
    // Strip all existing GUEST NAMES note entries
    var chunks = (s.notes || '').trim() ? (s.notes || '').trim().split(/\n\n+/) : [];
    var kept = chunks.filter(function(c) {
      return !/^\[([^\]]+)\]\s+GUEST NAMES\s+\u2014/.test(c.trim());
    });
    // Write a fresh GUEST NAMES entry if any names provided
    var now = new Date();
    var pad = function(n) { return n < 10 ? '0' + n : String(n); };
    var h = now.getHours(), ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (!h) h = 12;
    var ts = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + ' ' + pad(h) + ':' + pad(now.getMinutes()) + ' ' + ampm;
    if (newNames.length > 0) {
      kept.push('[' + ts + '] GUEST NAMES \u2014 ' + newNames.join('|'));
    }
    // Log admin note if guest data changed
    var guestDataChanged = prevGuestCount !== newGuestCount || prevNames.join('|') !== newNames.join('|');
    if (guestDataChanged) {
      var noteText = 'Guest list updated by admin. Count: ' + prevGuestCount + ' \u2192 ' + newGuestCount + '.';
      if (newNames.length > 0) noteText += ' Names: ' + newNames.join(', ') + '.';
      else if (prevNames.length > 0) noteText += ' Names cleared.';
      kept.push('[' + ts + '] ADMIN NOTE \u2014 ' + noteText);
    }
    s.notes = kept.join('\n\n');
  }

  msg = {m: s.name + " updated.", t:"s"};
  pushRoster();
}

// Communications state
var commsState = {
  tplKey: "none",
  tplOverrides: {},        // {studentId: {subject, body}}
  selectedId: null,
  checkedIds: {},          // {studentId: true} — checked for sending
  filterStatus: "all-active",
  filterSeg: "all",
  filterTags: [],
  search: "",
  editingTemplate: false,
  editBuf: {subject:"", body:""}
};

var DAY_DATES = {Monday:"June 15",Tuesday:"June 16",Wednesday:"June 17",Thursday:"June 18",Friday:"June 19"};

function commsParentName(fullName) {
  if (!fullName) return "";
  var parts = fullName.trim().split(/\s+/);
  if (parts.length <= 1) return parts[0] || "";
  return parts.slice(0, parts.length - 1).join(" ");
}

function commsArrivalTime(seg) {
  if (seg === "Late") return "4:45 to 5:00 PM";
  return "3:30 to 3:50 PM"; // Early and Friday
}

function commsStartTime(seg) {
  return seg === "Late" ? "5:00 PM" : "4:00 PM";
}

function commsEarlyLate(seg) {
  if (seg === "Single") return "Single Performance";
  return seg || "";
}

function mergeTemplate(tplSubject, tplBody, student) {
  var parent = student.parentFirst || commsParentName(student.name || "");
  var seg = student.seg || "";
  var day = student.day || "";
  var date = DAY_DATES[day] || "";
  var arrivalTime = commsArrivalTime(seg);
  var startTime = commsStartTime(seg);
  var earlyLate = commsEarlyLate(seg);
  var appUrl = "https://keylabnyc.github.io/keylab-performance-parties-2026/";
  var websiteUrl = "https://www.keylab.nyc/performance-parties";

  function rep(s) {
    return s
      .replace(/\[PARENT NAME\]/g, parent)
      .replace(/\[STUDENT NAME\]/g, student.name || "")
      .replace(/\[STUDENT FIRST NAME\]/g, (student.name || "").split(' ')[0])
      .replace(/\[PASSWORD\]/g, student.password || "")
      .replace(/\[DAY\]/g, day)
      .replace(/\[DATE\]/g, date)
      .replace(/\[EARLY\/LATE\]/g, earlyLate)
      .replace(/\[ARRIVAL TIME\]/g, arrivalTime)
      .replace(/\[START TIME\]/g, startTime)
      .replace(/\[APP URL\]/g, appUrl)
      .replace(/\[APP LINK\]/g, '<a href="' + appUrl + '">' + appUrl + '</a>')
      .replace(/\[WEBSITE URL\]/g, websiteUrl)
      .replace(/\[WEBSITE LINK\]/g, '<a href="' + websiteUrl + '">' + websiteUrl + '</a>');
  }
  return {subject: rep(tplSubject), body: rep(tplBody)};
}

function commsFilterRecipients() {
  var st = commsState.filterStatus;
  var seg = commsState.filterSeg;
  var q = commsState.search.toLowerCase().trim();
  var activeTags = commsState.filterTags;
  return roster.filter(function(s) {
    var stOk = false;
    if (st === "all-active") stOk = ["unconfirmed","confirmed","confirmed-guest"].indexOf(s.status) !== -1;
    else if (st === "active-all") stOk = ["unconfirmed","confirmed","confirmed-guest"].indexOf(s.status) !== -1;
    else if (st === "confirmed-or-guest") stOk = s.status === "confirmed" || s.status === "confirmed-guest";
    else if (st === "all") stOk = true;
    else stOk = s.status === st;
    var segOk = seg === "all";
    if (!segOk) {
      var parts = seg.split(" ");
      var segDay = parts.slice(0, parts.length - 1).join(" ");
      var segSeg = parts[parts.length - 1];
      segOk = s.day === segDay && s.seg === segSeg;
    }
    var qOk = !q || (s.name || "").toLowerCase().indexOf(q) !== -1;
    // Tag filter: OR within selected tags (student must have at least one selected tag)
    var tagOk = activeTags.length === 0;
    if (!tagOk) {
      var studentTags = (s.tags || '').split('|').map(function(t) { return t.trim(); });
      tagOk = activeTags.some(function(ft) { return studentTags.indexOf(ft) > -1; });
    }
    return stOk && segOk && qOk && tagOk;
  });
}

function commsMergedForStudent(s) {
  var ovr = commsState.tplOverrides[s.id];
  if (ovr) return ovr;
  var tpl = COMM_TEMPLATES[commsState.tplKey];
  if (!tpl || commsState.tplKey === "none") return {subject: "", body: ""};
  return mergeTemplate(tpl.subject, tpl.body, s);
}

function commsSelectTemplate(key) {
  commsState.tplKey = key;
  commsState.tplOverrides = {};
  commsState.checkedIds = {};
  commsState.selectedId = null;
  commsState.editingTemplate = false;
  if (key !== "none") {
    commsState.filterStatus = COMM_TEMPLATES[key].defaultStatus;
  }
  commsState.filterSeg = "all";
  commsState.filterTags = [];
  commsState.search = "";
  render();
}

function commsSelectFamily(id) {
  commsState.selectedId = id;
  commsState.editingTemplate = false;
  renderCommsPreview();
}

function commsApplyFilter() {
  var stEl = document.getElementById("cm-st");
  var segEl = document.getElementById("cm-seg");
  var qEl = document.getElementById("cm-search");
  if (stEl) commsState.filterStatus = stEl.value;
  if (segEl) commsState.filterSeg = segEl.value;
  if (qEl) commsState.search = qEl.value;
  renderCommsList();
  renderCommsCount();
}

function toggleCommsTag(tag) {
  var idx = commsState.filterTags.indexOf(tag);
  if (idx > -1) commsState.filterTags.splice(idx, 1);
  else commsState.filterTags.push(tag);
  renderCommsList();
  renderCommsCount();
  // Re-render tag buttons to update active state without full render
  var tagRow = document.getElementById("cm-tag-row");
  if (tagRow) tagRow.innerHTML = buildCommsTagButtons();
}

function buildCommsTagButtons() {
  // Collect all tags from roster, strip orig: prefixes, deduplicate
  var tagSet = {};
  roster.forEach(function(s) {
    if (!s.tags) return;
    s.tags.split('|').forEach(function(t) {
      t = t.trim();
      if (!t || t.indexOf('orig:') === 0) return;
      tagSet[t] = true;
    });
  });
  var tags = Object.keys(tagSet).sort();
  if (!tags.length) return '<span style="font-size:10px;color:var(--text3)">No tags in roster</span>';
  return tags.map(function(t) {
    var active = commsState.filterTags.indexOf(t) > -1;
    var borderBg = active ? 'var(--bt);background:var(--bt);color:#fff' : 'var(--border2);background:var(--bg2);color:var(--text2)';
    return '<button onclick="toggleCommsTag(&apos;' + t + '&apos;)" style="font-size:10px;padding:2px 8px;border-radius:4px;border:.5px solid ' +
      borderBg + ';cursor:pointer;font-family:DM Sans,sans-serif">' + esc(t) + '</button>';
  }).join('');
}

function renderCommsCount() {
  var el = document.getElementById("cm-count");
  if (!el) return;
  var checked = Object.keys(commsState.checkedIds).length;
  var recipients = commsFilterRecipients().filter(function(s) { return s.email && s.email.trim(); });
  var noEmail = commsFilterRecipients().filter(function(s) { return !s.email || !s.email.trim(); });
  var countStr = checked > 0
    ? '<strong style="color:var(--acc)">' + checked + ' selected</strong> &bull; ' + recipients.length + ' match filter'
    : recipients.length + " match filter";
  el.innerHTML = countStr + (noEmail.length ? " \u00b7 " + noEmail.length + " no email" : "");
  // Update send button label
  var sendBtn = document.getElementById("cm-send-btn");
  if (sendBtn) {
    var n = checked || recipients.length;
    sendBtn.textContent = checked > 0
      ? "Send to " + checked + " selected"
      : "Send to all " + recipients.length + " matching";
    sendBtn.disabled = n === 0;
  }
}

function commsToggleCheck(id, evt) {
  evt.stopPropagation();
  if (commsState.checkedIds[id]) {
    delete commsState.checkedIds[id];
    // If we unchecked the currently selected family, clear selection
    if (commsState.selectedId === id) commsState.selectedId = null;
  } else {
    commsState.checkedIds[id] = true;
    // Auto-select this family in the preview panel
    commsState.selectedId = id;
  }
  renderCommsList();
  renderCommsCount();
  renderCommsPreview();
}

function commsToggleCheckAll() {
  var families = commsFilterRecipients().filter(function(s) { return s.email && s.email.trim(); });
  var allChecked = families.every(function(s) { return commsState.checkedIds[s.id]; });
  if (allChecked) {
    families.forEach(function(s) { delete commsState.checkedIds[s.id]; });
  } else {
    families.forEach(function(s) { commsState.checkedIds[s.id] = true; });
  }
  renderCommsList();
  renderCommsCount();
}

function renderCommsList() {
  var el = document.getElementById("cm-list");
  if (!el) return;
  var families = commsFilterRecipients();
  if (!families.length) {
    el.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:8px 0">No families match the current filter.</div>';
    return;
  }
  var withEmail = families.filter(function(s) { return s.email && s.email.trim(); });
  var allChecked = withEmail.length > 0 && withEmail.every(function(s) { return commsState.checkedIds[s.id]; });

  var h = '<div style="display:flex;align-items:center;gap:6px;padding:4px 7px;border-bottom:.5px solid var(--border2);margin-bottom:2px">' +
    '<input type="checkbox" id="cm-check-all"' + (allChecked ? ' checked' : '') + ' onchange="commsToggleCheckAll()" style="flex-shrink:0;cursor:pointer">' +
    '<span style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;flex:1">Select all with email (' + withEmail.length + ')</span>' +
    '</div>';

  families.forEach(function(s) {
    var hasOverride = !!commsState.tplOverrides[s.id];
    var isSelected = commsState.selectedId === s.id;
    var isChecked = !!commsState.checkedIds[s.id];
    var noEmail = !s.email || !s.email.trim();
    var stCls = STCLS[s.status] || "su";
    var seg = s.seg === "Single" ? "Fri" : (s.day || "").slice(0,3) + " " + (s.seg || "");
    h += '<div onclick="commsSelectFamily(\'' + s.id + '\')" style="display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:5px;cursor:pointer;min-width:0;overflow:hidden;' +
      (isSelected ? 'background:var(--bg3);' : 'background:transparent;') + '">' +
      '<input type="checkbox"' + (isChecked ? ' checked' : '') + (noEmail ? ' disabled' : '') +
        ' onclick="commsToggleCheck(\'' + s.id + '\',event)" style="flex-shrink:0;cursor:pointer" ' +
        (noEmail ? 'title="No email on file"' : '') + '>' +
      '<span style="flex:1;font-size:11px;color:var(--text);font-family:\'DM Mono\',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;' + (noEmail ? 'opacity:.4;' : '') + '">' + esc(s.name) + '</span>' +
      (hasOverride ? '<span style="width:6px;height:6px;border-radius:50%;background:#e8560a;flex-shrink:0;display:inline-block" title="Individual edit"></span>' : '') +
      '<span class="sb ' + stCls + '" style="pointer-events:none;flex-shrink:0;font-size:9px">' + esc(STLBL[s.status] || s.status) + '</span>' +
      '</div>';
  });
  el.innerHTML = h;
}

function renderCommsPreview() {
  var subjEl = document.getElementById("cm-prev-subj");
  var bodyEl = document.getElementById("cm-prev-body");
  var nameEl = document.getElementById("cm-prev-name");
  var editBtn = document.getElementById("cm-edit-ind-btn");
  var saveBtn = document.getElementById("cm-save-ind-btn");
  var cancelBtn = document.getElementById("cm-cancel-ind-btn");
  if (!subjEl || !bodyEl) return;

  var s = commsState.selectedId ? roster.filter(function(r){ return r.id === commsState.selectedId; })[0] : null;
  if (!s) {
    if (nameEl) nameEl.textContent = "Select a family to preview";
    subjEl.value = "";
    bodyEl.value = "";
    subjEl.readOnly = true;
    bodyEl.readOnly = true;
    if (editBtn) editBtn.style.display = "none";
    if (saveBtn) saveBtn.style.display = "none";
    if (cancelBtn) cancelBtn.style.display = "none";
    return;
  }

  var merged = commsMergedForStudent(s);
  var isOverride = !!commsState.tplOverrides[s.id];

  if (nameEl) {
    nameEl.textContent = s.name + (isOverride ? " \u2022 edited" : "");
    nameEl.style.color = isOverride ? "#e8560a" : "var(--text2)";
  }
  subjEl.value = merged.subject;
  bodyEl.value = merged.body;
  subjEl.readOnly = false;
  bodyEl.readOnly = false;

  if (editBtn) editBtn.style.display = "none"; // editing is always live
  if (saveBtn) saveBtn.style.display = "inline-block";
  if (cancelBtn) cancelBtn.style.display = isOverride ? "inline-block" : "none";
}

function commsSaveIndividual() {
  var s = commsState.selectedId ? roster.filter(function(r){ return r.id === commsState.selectedId; })[0] : null;
  if (!s) return;
  var subjEl = document.getElementById("cm-prev-subj");
  var bodyEl = document.getElementById("cm-prev-body");
  if (!subjEl || !bodyEl) return;
  commsState.tplOverrides[s.id] = {subject: subjEl.value, body: bodyEl.value};
  renderCommsList();
  renderCommsPreview();
}

function commsClearIndividual() {
  if (!commsState.selectedId) return;
  delete commsState.tplOverrides[commsState.selectedId];
  renderCommsPreview();
  renderCommsList();
}

function commsOpenEditTemplate() {
  var tpl = COMM_TEMPLATES[commsState.tplKey];
  commsState.editingTemplate = true;
  commsState.editBuf = {subject: tpl.subject, body: tpl.body};
  var overlay = document.getElementById("cm-tpl-overlay");
  if (overlay) {
    overlay.style.display = "flex";
    var es = document.getElementById("cm-tpl-edit-subj");
    var eb = document.getElementById("cm-tpl-edit-body");
    if (es) es.value = tpl.subject;
    if (eb) eb.value = tpl.body;
  }
}

function commsSaveEditTemplate() {
  var es = document.getElementById("cm-tpl-edit-subj");
  var eb = document.getElementById("cm-tpl-edit-body");
  if (!es || !eb) return;
  var key = commsState.tplKey;
  var subj = es.value;
  var body = eb.value;
  COMM_TEMPLATES[key].subject = subj;
  COMM_TEMPLATES[key].body = body;
  // Clear all overrides since base template changed
  commsState.tplOverrides = {};
  commsState.editingTemplate = false;
  var overlay = document.getElementById("cm-tpl-overlay");
  if (overlay) overlay.style.display = "none";
  // Persist to Script Properties — pass label/defaultStatus to preserve custom template metadata
  var tplMeta = COMM_TEMPLATES[key] || {};
  api({action:"saveTemplate", password:PW, key:key, subject:subj, body:body, label:tplMeta.label||key, defaultStatus:tplMeta.defaultStatus||"all-active"}, function(e, r) {
    if (e || !r || !r.ok) {
      msg = {m:"Template saved locally but failed to persist: " + ((r&&r.error)||"unknown error"), t:"e"};
    } else {
      msg = {m:"✅ Template saved.", t:"s"};
    }
    render();
  });
  renderCommsList();
  renderCommsPreview();
}

function commsCancelNewTemplate() {

function commsSaveNewTemplate() {
  var lEl = document.getElementById("cm-new-tpl-label");
  var sEl = document.getElementById("cm-new-tpl-subj");
  var bEl = document.getElementById("cm-new-tpl-body");
  if (!lEl || !sEl || !bEl) return;
  var label = lEl.value.trim();
  var subj  = sEl.value.trim();
  var body  = bEl.value.trim();
  if (!label) { alert("Please enter a template name."); return; }
  if (!subj)  { alert("Please enter a subject line."); return; }
  // Generate a unique key from label
  var key = "custom_" + label.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "") + "_" + Date.now();
  // Add to in-memory COMM_TEMPLATES
  COMM_TEMPLATES[key] = {
    label: label,
    defaultStatus: "all-active",
    subject: subj,
    body: body,
    custom: true
  };
  // Persist to Script Properties (include label and defaultStatus)
  api({action:"saveTemplate", password:PW, key:key, subject:subj, body:body, label:label, defaultStatus:"all-active"}, function(e, r) {
    if (e || !r || !r.ok) {
      msg = {m:"Template created locally but failed to persist: " + ((r&&r.error)||"unknown error"), t:"e"};
    } else {
      msg = {m:"\u2705 Template \"" + label + "\" created and saved.", t:"s"};
    }
    // Select the new template
    commsState.tplKey = key;
    commsState.tplOverrides = {};
    commsState.filterTags = [];
    commsState.search = "";
    var overlay = document.getElementById("cm-new-tpl-overlay");
    if (overlay) overlay.style.display = "none";
    render();
  });
}

function commsSend() {
  // In no-template mode, auto-save preview panel content before sending
  if (commsState.tplKey === "none" && commsState.selectedId) {
    var subjEl = document.getElementById("cm-prev-subj");
    var bodyEl = document.getElementById("cm-prev-body");
    if (subjEl && bodyEl && (subjEl.value.trim() || bodyEl.value.trim())) {
      commsState.tplOverrides[commsState.selectedId] = {
        subject: subjEl.value,
        body: bodyEl.value
      };
    }
  }

  // Determine recipients: checked families, or all filtered if none checked
  var checked = Object.keys(commsState.checkedIds);
  var families;
  if (checked.length > 0) {
    families = roster.filter(function(s) { return commsState.checkedIds[s.id] && s.email && s.email.trim(); });
  } else {
    families = commsFilterRecipients().filter(function(s) { return s.email && s.email.trim(); });
  }
  if (!families.length) { alert("No recipients with email addresses found."); return; }

  var overrideCount = families.filter(function(s) { return !!commsState.tplOverrides[s.id]; }).length;
  var overlay = document.getElementById("cm-confirm-overlay");
  if (!overlay) return;

  // Subject preview — use first family's merged subject
  var previewSubj = commsMergedForStudent(families[0]).subject || "(no subject)";

  var h = '<div style="background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--rl);padding:1.25rem;max-width:520px;width:90%;max-height:80vh;overflow-y:auto">';
  h += '<div style="font-size:12px;color:var(--text3);margin-bottom:12px">' +
    '<strong style="color:var(--text);font-size:14px">Confirm Send</strong><br>' +
    'Sending to <strong style="color:var(--text)">' + families.length + ' ' + (families.length === 1 ? 'family' : 'families') + '</strong>' +
    (overrideCount ? ' &bull; <span style="color:#e8560a">' + overrideCount + ' with individual edits</span>' : '') + '</div>';
  h += '<div style="font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Subject</div>';
  h += '<div style="font-size:11px;font-family:\'DM Mono\',monospace;background:var(--bg3);padding:6px 9px;border-radius:5px;margin-bottom:12px;color:var(--text2)">' + esc(previewSubj) + '</div>';
  h += '<div style="font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Recipients</div>';
  h += '<div style="max-height:200px;overflow-y:auto;background:var(--bg3);border-radius:5px;padding:6px 9px;margin-bottom:16px">';
  families.forEach(function(s) {
    var hasOvr = !!commsState.tplOverrides[s.id];
    h += '<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:10px;font-family:\'DM Mono\',monospace">' +
      '<span style="flex:1;color:var(--text2)">' + esc(s.name) + '</span>' +
      (hasOvr ? '<span style="color:#e8560a;font-size:9px">edited</span>' : '') +
      '<span style="color:var(--text3)">' + esc(s.email) + '</span>' +
      '</div>';
  });
  h += '</div>';
  h += '<div style="display:flex;gap:8px;justify-content:flex-end">' +
    '<button class="btn" onclick="document.getElementById(\'cm-confirm-overlay\').style.display=\'none\'">Cancel</button>' +
    '<button class="btn btnp" onclick="commsExecuteSend()">Send ' + families.length + ' email' + (families.length !== 1 ? 's' : '') + '</button>' +
    '</div></div>';

  overlay.innerHTML = h;
  overlay.style.display = "flex";
}

function commsExecuteSend() {
  var overlay = document.getElementById("cm-confirm-overlay");
  if (overlay) overlay.style.display = "none";

  // In no-template mode, auto-save whatever is in the preview panel
  // for the selected family before building the emails array
  if (commsState.tplKey === "none" && commsState.selectedId) {
    var subjEl = document.getElementById("cm-prev-subj");
    var bodyEl = document.getElementById("cm-prev-body");
    if (subjEl && bodyEl && (subjEl.value.trim() || bodyEl.value.trim())) {
      commsState.tplOverrides[commsState.selectedId] = {
        subject: subjEl.value,
        body: bodyEl.value
      };
    }
  }

  var checked = Object.keys(commsState.checkedIds);
  var families;
  if (checked.length > 0) {
    families = roster.filter(function(s) { return commsState.checkedIds[s.id] && s.email && s.email.trim(); });
  } else {
    families = commsFilterRecipients().filter(function(s) { return s.email && s.email.trim(); });
  }

  var emails = families.map(function(s) {
    var merged = commsMergedForStudent(s);
    return {studentId: s.id, toEmail: s.email.trim(), subject: merged.subject, body: merged.body};
  });

  var fbEl = document.getElementById("cm-send-feedback");
  var sendBtn = document.getElementById("cm-send-btn");
  if (fbEl) { fbEl.style.color = "var(--text3)"; fbEl.textContent = "Sending\u2026"; }
  if (sendBtn) sendBtn.disabled = true;

  api({action: "bulkEmail", password: PW, emails: emails}, function(e, r) {
    if (sendBtn) sendBtn.disabled = false;
    if (e || !r || !r.ok) {
      if (fbEl) { fbEl.style.color = "var(--rt)"; fbEl.textContent = "Error: " + (e ? String(e) : (r && r.error) || "Unknown error"); }
    } else {
      var errCount = (r.errors || []).length;
      if (fbEl) {
        fbEl.style.color = errCount ? "var(--at)" : "var(--gt)";
        var errMsg = (r.errors && r.errors[0] && r.errors[0].error) ? ' — ' + r.errors[0].error : '';
        fbEl.textContent = "\u2705 Sent: " + r.sent + (errCount ? " \u26a0 Failed: " + errCount + errMsg : "");
      }
      commsState.tplOverrides = {};
      commsState.checkedIds = {};
      renderCommsList();
      renderCommsCount();
    }
  });
}

function render() {
  var root = document.getElementById("root");
  var nr   = document.getElementById("nr");
  if (!root) return;

  if (!authed) {
    if (nr) nr.innerHTML = "";
    root.innerHTML = rLogin();
    return;
  }

  if (nr) nr.innerHTML = '<button class="btn" onclick="authed=false;render()">Sign out</button>';

  if (loading) {
    root.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text3)"><span class="spin">\u27f3</span> Loading&hellip;</div>';
    return;
  }

  // Snapshot open panels before rebuilding DOM
  var openPanels = [];
  document.querySelectorAll('[id^="mp-"]').forEach(function(el) {
    if (el.style.display !== 'none') openPanels.push(el.id);
  });

  var tot   = roster.length;
  var conf  = roster.filter(function(s) { return s.status === "confirmed"; }).length;
  var guest = roster.filter(function(s) { return s.status === "confirmed-guest"; }).length;
  var unc   = roster.filter(function(s) { return s.status === "unconfirmed"; }).length;
  var canc  = roster.filter(function(s) { return s.status === "cancelled"; }).length;
  var nop   = roster.filter(function(s) { return s.status === "not-participating"; }).length;

  var h = '<div class="tabs">';
  ["roster","add","comms"].forEach(function(t) {
    var lbl = t === "roster" ? "Roster" : t === "add" ? "Add Student" : "Communications";
    h += '<button class="tab' + (atab === t ? ' on' : '') + '" onclick="atab=\'' + t + '\';render()">' + lbl + '</button>';
  });
  h += '<span style="flex:1"></span>';
  if (saving) h += '<span style="font-size:11px;color:var(--text3);margin-right:8px"><span class="spin">\u27f3</span> Saving&hellip;</span>';
  h += '<button class="btn" onclick="loadRoster()" style="font-size:11px">\u27f3 Refresh</button>';
  h += '<button class="btn btnp" onclick="pushRoster()" style="font-size:11px;margin-left:4px">\u2b06 Push to Sheet</button></div>';

  if (msg.m) h += '<div class="msg m' + msg.t + '">' + msg.m + '</div>';

  // 6-stat grid
  h += '<div class="stats" style="grid-template-columns:repeat(6,1fr)">';
  h += '<div class="stat"><div class="sn">' + tot   + '</div><div class="sl">On roster</div></div>';
  h += '<div class="stat"><div class="sn" style="color:var(--gt)">'  + conf  + '</div><div class="sl">Confirmed performer</div></div>';
  h += '<div class="stat"><div class="sn" style="color:var(--bt)">'  + guest + '</div><div class="sl">Confirmed non-performer</div></div>';
  h += '<div class="stat"><div class="sn">'                          + unc   + '</div><div class="sl">Unconfirmed</div></div>';
  h += '<div class="stat"><div class="sn" style="color:var(--rt)">'  + canc  + '</div><div class="sl">Client cancel</div></div>';
  h += '<div class="stat"><div class="sn" style="color:var(--text3)">'+ nop  + '</div><div class="sl">Admin cancel</div></div>';
  h += '</div>';

  h += atab === "roster" ? rRoster() : atab === "add" ? rAdd() : rComms();
  root.innerHTML = h;

  // Post-render hooks
  afterRenderComms();

  // Restore open panels after DOM rebuild
  openPanels.forEach(function(panelId) {
    var el = document.getElementById(panelId);
    if (el) el.style.display = 'block';
  });
}

// ── Build the notes panel HTML (shared for active + inactive) ──
function buildNotesPanel(p) {
  var notesTrimmed = (p.notes || '').trim();
  var isGreen = pillIsGreen(notesTrimmed);

  var h = '<div id="mp-' + p.id + '" class="mpanel" style="display:none">';

  // Guest names — parse from most recent GUEST NAMES note entry
  var guestNames = [];
  if (notesTrimmed) {
    var gnEntries = notesTrimmed.split(/\n\n+/);
    for (var gi = gnEntries.length - 1; gi >= 0; gi--) {
      var gnChunk = gnEntries[gi].trim();
      var gnMatch = gnChunk.match(/^\[([^\]]+)\]\s+GUEST NAMES\s+—\s+([\s\S]*)$/);
      if (gnMatch) {
        var rawNames = gnMatch[2].trim();
        guestNames = rawNames ? rawNames.split('|').map(function(n) { return n.trim(); }).filter(Boolean) : [];
        break;
      }
    }
  }
  var guestCount = parseInt(p.guests) || 0;
  if (guestNames.length > 0 || guestCount > 0) {
    h += '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:7px 10px;margin-bottom:8px">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">';
    h += '<div style="font-size:10px;font-weight:600;color:#166534;text-transform:uppercase;letter-spacing:.06em">Guests on file (' + guestCount + ')</div>';
    h += '<button onclick="clearGuests(\'' + p.id + '\')" style="font-size:9px;padding:2px 7px;border-radius:4px;border:.5px solid #86efac;background:#dcfce7;color:#166534;cursor:pointer;font-family:DM Sans,sans-serif">Clear guests</button>';
    h += '</div>';
    if (guestNames.length > 0) {
      guestNames.forEach(function(n, i) {
        h += '<div style="font-size:11px;color:#14532d;padding:1px 0">&#9679; ' + esc(n) + '</div>';
      });
    } else {
      h += '<div style="font-size:11px;color:#14532d;padding:1px 0">' + guestCount + ' guest' + (guestCount !== 1 ? 's' : '') + ' (no names recorded)</div>';
    }
    h += '</div>';
  }

  // Read/unread toggle + resolve button
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">';
  h += '<div class="mpanel-section-label" style="padding-bottom:0">Family messages &amp; activity log</div>';
  h += '<div style="display:flex;gap:6px;align-items:center">';
  h += '<button class="read-toggle" id="readtog-' + p.id + '" onclick="toggleReadState(\'' + p.id + '\')">' +
    (isGreen ? 'Mark as read' : 'Mark as unread') + '</button>';
  if (hasAnyNotes(notesTrimmed)) {
    h += '<button class="read-toggle" style="color:var(--text3)" onclick="markResolved(\'' + p.id + '\')">Mark resolved</button>';
  }
  h += '</div>';
  h += '</div>';

  var entries = parseNotes(notesTrimmed);
  if (entries.length) {
    entries.forEach(function(entry, idx) {
      var typeCls = noteTypeClass(entry.type);
      var shortType = entry.type.replace('SCHEDULING REQUEST','SCHED REQ');
      // Build the raw chunk string so we can identify it for deletion
      var rawChunk = entry.ts ? '[' + entry.ts + '] ' + entry.type + ' \u2014 ' + entry.body : entry.body;
      h += '<div class="note-entry" style="display:flex;align-items:flex-start;gap:4px">';
      h += '<div style="flex:1;min-width:0">';
      if (entry.ts) h += '<span class="note-entry-ts">' + esc(entry.ts) + '</span>';
      h += '<span class="note-entry-type ' + typeCls + '">' + esc(shortType) + '</span>';
      h += '<span class="note-entry-body">' + esc(entry.body) + '</span>';
      h += '</div>';
      h += '<button onclick="deleteNote(\'' + p.id + '\',' + idx + ')" title="Delete this note" ' +
        'style="flex-shrink:0;background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:0 2px;line-height:1;margin-top:1px;' + '' + '" ' +
        'onmouseover="this.style.color=\'var(--rt)\'" onmouseout="this.style.color=\'var(--text3)\'">&#10005;</button>';
      h += '</div>';
    });
    h += '<div style="text-align:right;margin-top:4px">';
    h += '<button class="read-toggle" style="color:var(--rt);font-size:9px" onclick="clearAllNotes(\'' + p.id + '\')">Clear all notes</button>';
    h += '</div>';
  } else {
    h += '<div style="font-size:10px;color:var(--text3);padding:4px 0">No messages yet.</div>';
  }

  // Admin notes textarea
  h += '<hr class="mpanel-divider">';
  h += '<div class="mpanel-section-label">Admin note</div>';
  h += '<textarea class="admin-note-ta" id="ant-' + p.id + '" placeholder="Add an admin note\u2026"></textarea>';
  h += '<br><button class="note-expand" style="margin-top:4px" onclick="saveAdminNote(\'' + p.id + '\')">Save note</button>';

  h += '</div>';
  return h;
}

function toggleRosterTag(tag) {
  var idx = ftags.indexOf(tag);
  if (idx > -1) ftags.splice(idx, 1);
  else ftags.push(tag);
  render();
}

function rRoster() {

  var rosterTagSet = {};

  // Tag filter row
