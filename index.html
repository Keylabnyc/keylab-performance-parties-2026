    h += '<span style="font-size:11px;color:var(--text3)">Tag:</span>';
    rosterTags.forEach(function(t) {
      var active = ftags.indexOf(t) > -1;
      h += '<button class="tab' + (active ? ' on' : '') + '" onclick="toggleRosterTag(&apos;' + t + '&apos;)">' + t + '</button>';
    });
    if (ftags.length) {
      h += '<button style="font-size:10px;padding:2px 7px;border-radius:4px;border:.5px solid var(--border2);background:none;color:var(--text3);cursor:pointer;font-family:DM Sans,sans-serif;margin-left:4px" onclick="ftags=[];render()">Clear tags</button>';
    }
    h += '</div>';
  }

  var days = fday === "all" ? DAYS : [fday];
  days.forEach(function(day) {
    var segs = SEGS[day];
    h += '<div class="dr"><div class="dl">' + day + '</div><div class="ds' + (segs.length === 1 ? ' one' : '') + '">';
    segs.forEach(function(seg) {
      var k    = sk(day, seg);
      var allS = segSt(k);

      // Apply tag filter
      var tagFilter = function(x) {
        if (!ftags.length) return true;
        var sTags = (x.tags || '').split('|').map(function(t) { return t.trim(); });
        return ftags.some(function(ft) { return sTags.indexOf(ft) > -1; });
      };

      var act  = allS.filter(function(x) { return (x.status === "confirmed" || x.status === "unconfirmed" || x.status === "confirmed-guest") && tagFilter(x); });
      var ina  = allS.filter(function(x) { return (x.status === "cancelled" || x.status === "not-participating") && tagFilter(x); });

      if (fst !== "all") {
        var inactStatuses = ["cancelled","not-participating"];
        if (inactStatuses.indexOf(fst) > -1) {
          act = []; ina = ina.filter(function(x) { return x.status === fst; });
        } else {
          act = act.filter(function(x) { return x.status === fst; }); ina = [];
        }
      }

      var cf  = act.filter(function(x) { return x.status === "confirmed"; }).length;
      var cnp = act.filter(function(x) { return x.status === "confirmed-guest"; }).length;
      var hd  = act.filter(function(x) { return x.status === "unconfirmed"; }).length;
      var av  = Math.max(0, MP - act.length);
      var allAct = allS.filter(function(x) { return x.status === "confirmed" || x.status === "unconfirmed" || x.status === "confirmed-guest"; });
      var tm  = allAct.reduce(function(a, x) { return a + (parseInt(x.dur) || DD); }, 0);
      var confirmedAct = allS.filter(function(x) { return x.status === "confirmed" || x.status === "confirmed-guest"; });
      var gst   = confirmedAct.reduce(function(a, x) { return a + (parseInt(x.guests) || 0); }, 0);
      var seats = confirmedAct.length + gst;
      var seatsCls = seats >= 38 ? 'vw' : seats >= 35 ? 'vw' : 'vn';
      var seatsLabel = seats >= 38 ? seats + ' \u26a0' : seats >= 35 ? seats + ' !' : String(seats);
      var bt, bc;
      if (cf >= MP) { bt = "Full"; bc = "bf"; } else if (av === 0) { bt = "All held"; bc = "bh"; } else { bt = av + " open"; bc = "bo"; }

      h += '<div class="sc"><div class="sh"><span class="st">' + slbl(k) + ' <span style="font-size:10px;color:var(--text3);font-weight:400">' + TIMES[day][seg] + '</span></span><span class="bdg ' + bc + '">' + bt + '</span></div>';
      h += '<div class="ss" style="grid-template-columns:repeat(7,1fr)">';
      h += '<div class="sc2"><div class="sl2">CP</div><div class="sv ' + (cf >= MP ? 'vw' : 'vg') + '">' + cf + '/' + MP + '</div></div>';
      h += '<div class="sc2"><div class="sl2">CNP</div><div class="sv" style="color:var(--bt)">' + cnp + '</div></div>';
      h += '<div class="sc2"><div class="sl2">Unconf</div><div class="sv vn">' + hd + '</div></div>';
      h += '<div class="sc2"><div class="sl2">Open</div><div class="sv ' + (av === 0 ? 'vw' : 'vg') + '">' + av + '</div></div>';
      h += '<div class="sc2"><div class="sl2">Guests</div><div class="sv" style="color:var(--bt)">' + gst + '</div></div>';
      h += '<div class="sc2"><div class="sl2">Seats</div><div class="sv ' + seatsCls + '">' + seatsLabel + '</div></div>';
      h += '<div class="sc2"><div class="sl2">Duration</div><div class="sv vn">' + tm + 'm</div></div>';
      h += '</div>';
      h += '<ul class="pl">';

      if (!act.length && !ina.length) h += '<li style="font-size:11px;color:var(--text3);padding:4px 0">No students yet</li>';

      act.forEach(function(p, oi) {
        var aT   = oi === 0;
        var aB   = oi === act.length - 1;
        var ok2  = allK().filter(function(k2) { return k2 !== k; });
        var gVal = parseInt(p.guests) || 0;
        var stOpts = STS.map(function(s) {
          return '<option value="' + s + '"' + (s === p.status ? ' selected' : '') + '>' + STFULL[s] + '</option>';
        }).join('');

        var notesTrimmed = (p.notes || '').trim();
        var hasNotes = hasAnyNotes(notesTrimmed);
        var noteCount = countAllNotes(notesTrimmed);
        var isGreen = pillIsGreen(notesTrimmed);

        h += '<li class="pi"><div class="pr">';
        h += '<span class="ordnum">' + (oi + 1) + '</span>';
        h += '<button class="eb" onclick="moOrd(\'' + p.id + '\',\'' + k + '\',-1)"' + (aT ? ' disabled' : '') + '>&#9650;</button>';
        h += '<button class="eb" onclick="moOrd(\'' + p.id + '\',\'' + k + '\',1)"'  + (aB ? ' disabled' : '') + '>&#9660;</button>';
        h += '<span class="pn">' + lfmt(p.name) + '<span class="pt">' + fmtTime(p.lessonTime || '') + (p.instrument ? ' \u00b7 ' + esc(p.instrument) : '') + '</span></span>';

        // Notes pill — always shown; green=unread MSG, amber=notes read, grey=no notes/resolved
        var pState = pillState(notesTrimmed);
        var pillLabel = (pState === 'green')
          ? ('✉ ' + noteCount + (noteCount === 1 ? ' note' : ' notes'))
          : (hasNotes ? ('● ' + noteCount + (noteCount === 1 ? ' note' : ' notes')) : '● notes');
        h += '<button id="pill-' + p.id + '" class="notes-pill ' + pState + '" onclick="toggleNotesPanel(\'' + p.id + '\')">' + pillLabel + '</button>';

        h += '<button class="eb" onclick="setG(\'' + p.id + '\',-1)">&#8722;</button>';
        h += '<span class="gcount" id="gc-' + p.id + '">' + gVal + 'g</span>';
        h += '<button class="eb" onclick="setG(\'' + p.id + '\',1)">+</button>';
        h += '<select class="mv" style="width:90px;font-size:9px" onchange="setSt(\'' + p.id + '\',this.value)">' + stOpts + '</select>';
        h += '<select class="mv" onchange="movSt(\'' + p.id + '\',this.value);this.value=\'\'"><option value="">Move&hellip;</option><option value="unassigned">Unassigned</option>' + ok2.map(function(k2) { return '<option value="' + k2 + '">' + slbl(k2) + '</option>'; }).join("") + '</select>';
        h += '<button class="eb" onclick="toggleEdit(\'' + p.id + '\')" title="Edit student">&#9998;</button>';
        h += '<button class="eb" onclick="rmSt(\'' + p.id + '\')" style="color:var(--rt);border-color:var(--red)">&times;</button>';
        h += '</div>';

        // Inline edit form
        h += '<div id="ed-' + p.id + '" style="display:none;margin-top:6px;padding:8px;background:var(--bg);border-radius:6px;border:.5px solid var(--border2)">';
        h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">';
        h += '<div class="fg" style="min-width:120px"><label class="fl">Name</label><input id="en-' + p.id + '" value="' + esc(p.name) + '"></div>';
        h += '<div class="fg" style="min-width:80px"><label class="fl">Teacher</label><input id="et-' + p.id + '" value="' + esc(p.teacher||'') + '"></div>';
        h += '<div class="fg" style="min-width:120px"><label class="fl">Teacher full name</label><input id="etf-' + p.id + '" value="' + esc(p.teacherFull||'') + '"></div>';
        h += '<div class="fg" style="min-width:70px"><label class="fl">Lesson time</label><input id="elt-' + p.id + '" value="' + esc(fmtTime(p.lessonTime||'')) + '" placeholder="4:30 PM"></div>';
        h += '<div class="fg" style="min-width:50px"><label class="fl">Dur (min)</label><input id="ed2-' + p.id + '" type="number" min="1" max="20" value="' + (parseInt(p.dur)||4) + '" style="width:60px"></div>';
        h += '<div class="fg" style="min-width:100px"><label class="fl">Password</label><input id="epw-' + p.id + '" value="' + esc(p.password||'') + '"></div>';
        h += '<div class="fg" style="min-width:180px"><label class="fl">Family email</label><input id="ee-' + p.id + '" type="email" value="' + esc(p.email||'') + '" placeholder="email@example.com"></div>';
        h += '<div class="fg" style="min-width:90px"><label class="fl">Parent first</label><input id="epf-' + p.id + '" value="' + esc(p.parentFirst||'') + '"></div>';
        h += '<div class="fg" style="min-width:90px"><label class="fl">Parent last</label><input id="epl-' + p.id + '" value="' + esc(p.parentLast||'') + '"></div>';
        h += '<div class="fg" style="min-width:110px"><label class="fl">Instrument</label><input id="einst-' + p.id + '" value="' + esc(p.instrument||'') + '"></div>';
        var egNames = getStoredGuestNames(p.notes);
        h += '<div class="fg" style="min-width:50px"><label class="fl">Guests</label><input id="egc-' + p.id + '" type="number" min="0" max="3" value="' + (parseInt(p.guests)||0) + '" style="width:55px"></div>';
        h += '<div class="fg" style="min-width:130px"><label class="fl">Guest 1 name</label><input id="egn1-' + p.id + '" value="' + esc(egNames[0]||'') + '" placeholder="Optional" oninput="syncGuestCount(&apos;' + p.id + '&apos;)"></div>';
        h += '<div class="fg" style="min-width:130px"><label class="fl">Guest 2 name</label><input id="egn2-' + p.id + '" value="' + esc(egNames[1]||'') + '" placeholder="Optional" oninput="syncGuestCount(&apos;' + p.id + '&apos;)"></div>';
        h += '<div class="fg" style="min-width:130px"><label class="fl">Guest 3 name</label><input id="egn3-' + p.id + '" value="' + esc(egNames[2]||'') + '" placeholder="Optional" oninput="syncGuestCount(&apos;' + p.id + '&apos;)"></div>';
        h += '</div>';
        h += '<button class="btn btnp" style="font-size:11px;padding:4px 10px" onclick="saveEdit(\'' + p.id + '\')">Save</button> ';
        h += '<button class="btn" style="font-size:11px;padding:4px 10px" onclick="toggleEdit(\'' + p.id + '\')">Cancel</button>';
        h += '</div>';

        // Notes & messages panel
        h += buildNotesPanel(p);

        h += '</li>';
      });

      if (ina.length) {
        h += '<li><div class="nh">Not performing / not attending</div></li>';
        ina.forEach(function(p) {
          var stOpts = STS.map(function(s) {
            return '<option value="' + s + '"' + (s === p.status ? ' selected' : '') + '>' + STFULL[s] + '</option>';
          }).join('');

          var notesTrimmed = (p.notes || '').trim();
          var hasNotes = hasAnyNotes(notesTrimmed);
          var noteCount = countAllNotes(notesTrimmed);
          var isGreen = pillIsGreen(notesTrimmed);

          h += '<li class="pi"><div class="pr"><span class="pn" style="color:var(--text3)">' + lfmt(p.name) + '<span class="pt">' + (p.instrument ? esc(p.instrument) : '') + '</span></span>';

          // Notes pill — always shown on inactive rows too
          var pState2 = pillState(notesTrimmed);
          var pillLabel2 = (pState2 === 'green')
            ? ('✉ ' + noteCount + (noteCount === 1 ? ' note' : ' notes'))
            : (hasNotes ? ('● ' + noteCount + (noteCount === 1 ? ' note' : ' notes')) : '● notes');
          h += '<button id="pill-' + p.id + '" class="notes-pill ' + pState2 + '" onclick="toggleNotesPanel(\'' + p.id + '\')">' + pillLabel2 + '</button>';

          h += '<select class="mv" style="width:90px;font-size:9px" onchange="setSt(\'' + p.id + '\',this.value)">' + stOpts + '</select>';
          h += '<button class="eb" onclick="rmSt(\'' + p.id + '\')" style="color:var(--rt);border-color:var(--red)">&times;</button>';
          h += '</div>';

          // Full notes panel for inactive rows
          h += buildNotesPanel(p);

          h += '</li>';
        });
      }

      // ── Scheduling requests for this segment ──────────────────
      var segKey = day + '_' + seg;
      var requesters = roster.filter(function(r) {
        // Condition 1: student is already in this segment — hide
        if (r.day === day && r.seg === seg) return false;
        // Condition 2: cancelled = family cancelled, always exclude
        // not-participating with a segment = admin cancelled, exclude
        // not-participating without a segment = unassigned (Saturday etc.), allow through
        if (r.status === 'cancelled') return false;
        if (r.status === 'not-participating' && r.day && r.seg) return false;
        // Condition 3: must have notes with a SCHEDULING REQUEST
        var notes = (r.notes || '').trim();
        if (!notes) return false;
        var chunks = notes.split(/\n\n+/);
        // Find index of most recent SCHEDULING REQUEST
        var lastSchedIdx = -1;
        for (var ci = 0; ci < chunks.length; ci++) {
          var c = chunks[ci].trim();
          if (/^\[([^\]]+)\]\s+SCHEDULING REQUEST\s+—/.test(c)) lastSchedIdx = ci;
        }
        if (lastSchedIdx < 0) return false;
        // Check if any resolution event appears after the scheduling request
        for (var ri = lastSchedIdx + 1; ri < chunks.length; ri++) {
          var rc = chunks[ri].trim();
          if (/^\[([^\]]+)\]\s+(RESOLVED|CONFIRMED|CANCELLATION|RESCHEDULE)\s+—/.test(rc)) return false;
        }
        // Check if this segment is mentioned in the scheduling request
        var srChunk = chunks[lastSchedIdx].trim();
        var srMatch = srChunk.match(/^\[([^\]]+)\]\s+SCHEDULING REQUEST\s+—\s+([\s\S]*)$/);
        if (!srMatch) return false;
        var srBody = srMatch[2];
        var slotsMatch = srBody.match(/Preferred slots:\s*([^.\n]+)/);
        if (!slotsMatch) return false;
        var reqSegs = slotsMatch[1].split(',').map(function(x) { return x.trim().replace(/\s*\[[^\]]+\]$/, '').trim(); });
        return reqSegs.some(function(rs) {
          return rs === (day + ' ' + seg) || rs.replace(/ /g,'_') === segKey;
        });
      });

      // Sort by timestamp of the scheduling request note — earliest first (first come, first served)
      requesters.sort(function(a, b) {
        function getSchedMs(student) {
          var notes = (student.notes || '').trim();
          if (!notes) return 0;
          var chunks = notes.split(/\n\n+/);
          var lastSchedIdx = -1;
          for (var ci = 0; ci < chunks.length; ci++) {
            if (/^\[([^\]]+)\]\s+SCHEDULING REQUEST\s+—/.test(chunks[ci].trim())) lastSchedIdx = ci;
          }
          if (lastSchedIdx < 0) return 0;
          var m = chunks[lastSchedIdx].trim().match(/^\[([^\]]+)\]/);
          if (!m) return 0;
          // Parse "2026-04-23 10:30 AM" or "2026-04-23 02:45 PM" into a comparable number
          var tm = m[1].match(/^(\d{4}-\d{2}-\d{2})\s+(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
          if (!tm) return 0;
          var h = parseInt(tm[2]);
          var isPM = tm[4].toUpperCase() === 'PM';
          if (isPM && h !== 12) h += 12;
          if (!isPM && h === 12) h = 0;
          return new Date(tm[1] + 'T' + (h < 10 ? '0' : '') + h + ':' + tm[3] + ':00').getTime();
        }
        return getSchedMs(a) - getSchedMs(b);
      });

      // Eligible students for admin hold form (not already in this segment, not inactive)
      var holdCandidates = roster.filter(function(r) {
        if (r.day === day && r.seg === seg) return false;
        if (r.status === 'not-participating') return false;
        return true;
      });

      // Always show the requests area so admin hold is always accessible
      h += '<div style="margin-top:6px;padding:6px 10px;background:var(--bg3);border:.5px solid var(--border2);border-radius:6px">';
      h += '<div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Scheduling requests</div>';

      requesters.forEach(function(r) {
        var curSeg = r.day && r.seg ? r.day + ' ' + r.seg : 'unassigned';
        var types = getSchedRequestTypes(r.notes);
        var type = types[segKey] || 'requested';
        var typeOpts = ['preferred','available','last-resort','sibling','admin-hold','requested'].map(function(t) {
          return '<option value="' + t + '"' + (t === type ? ' selected' : '') + '>' + (SCHED_TYPE_LABELS[t] || t) + '</option>';
        }).join('');
        h += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;flex-wrap:wrap">';
        h += '<strong style="font-size:11px;color:var(--text)">' + esc(r.name) + '</strong>';
        h += '<span style="font-size:10px;color:var(--text3)">&mdash; currently ' + esc(curSeg) + '</span>';
        h += '<select class="mv" style="width:auto;min-width:110px" onchange="updateSchedRequestType(\'' + r.id + '\',\'' + segKey + '\',this.value)">' + typeOpts + '</select>';
        h += '</div>';
      });

      if (requesters.length === 0) {
        h += '<div style="font-size:10px;color:var(--text3);padding:2px 0">No requests yet</div>';
      }

      // Admin hold form
      h += '<div style="margin-top:5px">';
      h += '<button onclick="toggleHoldForm(\'' + segKey + '\')" style="font-size:9px;padding:2px 7px;border-radius:4px;border:.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:DM Sans,sans-serif">\uFF0B Add hold</button>';
      h += '</div>';
      h += '<div id="hold-form-' + segKey + '" style="display:none;margin-top:6px;padding:6px 8px;background:var(--bg2);border:.5px solid var(--border2);border-radius:5px">';
      h += '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end">';
      h += '<div><div style="font-size:9px;font-weight:600;color:var(--text3);margin-bottom:2px">Student</div>';
      h += '<div style="position:relative">';
      h += '<input id="hold-search-' + segKey + '" placeholder="Type name\u2026" oninput="filterHoldStudents(\'' + segKey + '\')" autocomplete="off" style="font-size:11px;padding:3px 5px;border-radius:4px;border:.5px solid var(--border2);background:var(--bg3);color:var(--text);width:140px">';
      h += '<input type="hidden" id="hold-student-' + segKey + '">';
      h += '<div id="hold-results-' + segKey + '" style="display:none;position:absolute;top:100%;left:0;width:200px;background:var(--bg2);border:.5px solid var(--border2);border-radius:4px;z-index:10;max-height:160px;overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,.2)"></div>';
      h += '</div></div>';
      h += '<div><div style="font-size:9px;font-weight:600;color:var(--text3);margin-bottom:2px">Type</div>';
      h += '<select id="hold-type-' + segKey + '" style="font-size:11px;padding:3px 5px;border-radius:4px;border:.5px solid var(--border2);background:var(--bg3);color:var(--text);width:auto">';
      ['admin-hold','preferred','available','last-resort','sibling','requested'].forEach(function(t) {
        h += '<option value="' + t + '">' + (SCHED_TYPE_LABELS[t] || t) + '</option>';
      });
      h += '</select></div>';
      h += '<div style="flex:1;min-width:100px"><div style="font-size:9px;font-weight:600;color:var(--text3);margin-bottom:2px">Note (optional)</div>';
      h += '<input id="hold-note-' + segKey + '" style="font-size:11px;padding:3px 5px;border-radius:4px;border:.5px solid var(--border2);background:var(--bg3);color:var(--text);width:100%" placeholder="e.g. spoke with parent"></div>';
      h += '<button onclick="submitHoldForm(\'' + segKey + '\')" class="btn btnp" style="font-size:9px;padding:3px 8px;white-space:nowrap">Add</button>';
      h += '<button onclick="toggleHoldForm(\'' + segKey + '\')" class="btn" style="font-size:9px;padding:3px 8px">Cancel</button>';
      h += '</div></div>';
      h += '</div>';

      h += '</ul></div>';
    });
    h += '</div></div>';
  });

  // ── Unassigned students (no day/seg) ──────────────────────────
  var unassigned = roster.filter(function(s) {
    return !s.day && !s.seg;
  });
  // Apply tag filter if active
  if (ftags.length) {
    unassigned = unassigned.filter(function(s) {
      var sTags = (s.tags || '').split('|').map(function(t) { return t.trim(); });
      return ftags.some(function(ft) { return sTags.indexOf(ft) > -1; });
    });
  }
  // Apply status filter if active
  if (fst !== 'all') {
    unassigned = unassigned.filter(function(s) { return s.status === fst; });
  }
  if (unassigned.length) {
    h += '<div class="dr"><div class="dl">Unassigned</div><div class="ds one">';
    h += '<div class="sc"><div class="sh"><span class="st">No segment assigned</span></div>';
    h += '<ul class="pl">';
    unassigned.forEach(function(p) {
      var stOpts = STS.map(function(s) {
        return '<option value="' + s + '"' + (s === p.status ? ' selected' : '') + '>' + STFULL[s] + '</option>';
      }).join('');
      var notesTrimmed = (p.notes || '').trim();
      var hasNotes = hasAnyNotes(notesTrimmed);
      var noteCount = countAllNotes(notesTrimmed);
      var pState = pillState(notesTrimmed);
      var pillLabel = (pState === 'green')
        ? ('✉ ' + noteCount + (noteCount === 1 ? ' note' : ' notes'))
        : (hasNotes ? ('● ' + noteCount + (noteCount === 1 ? ' note' : ' notes')) : '● notes');
      var tagDisplay = (p.tags || '').split('|').filter(function(t) { return t && t.indexOf('orig:') !== 0; }).join(', ');
      var uDayOpts = '<option value="">Unassigned</option>' + DAYS.map(function(d) { return '<option value="' + d + '"' + (p.day === d ? ' selected' : '') + '>' + d + '</option>'; }).join('');
      var uSegOpts = '<option value="Early"' + (p.seg === 'Early' ? ' selected' : '') + '>Early (4pm)</option><option value="Late"' + (p.seg === 'Late' ? ' selected' : '') + '>Late (5pm)</option><option value="Single"' + (p.seg === 'Single' ? ' selected' : '') + '>Single (4pm)</option>';
      h += '<li class="pi"><div class="pr">';
      h += '<span class="pn" style="color:var(--text3)">' + lfmt(p.name);
      h += '<span class="pt">' + (p.teacher ? esc(p.teacher) : '') + (tagDisplay ? ' · ' + esc(tagDisplay) : '') + '</span></span>';
      h += '<button id="pill-' + p.id + '" class="notes-pill ' + pState + '" onclick="toggleNotesPanel(\'' + p.id + '\')">' + pillLabel + '</button>';
      h += '<select class="mv" style="width:90px;font-size:9px" onchange="setSt(\'' + p.id + '\',this.value)">' + stOpts + '</select>';
      h += '<button class="eb" onclick="toggleEdit(\'' + p.id + '\')" title="Edit student">&#9998;</button>';
      h += '<button class="eb" onclick="rmSt(\'' + p.id + '\')" style="color:var(--rt);border-color:var(--red)">&times;</button>';
      h += '</div>';
      h += '<div id="ed-' + p.id + '" style="display:none;margin-top:6px;padding:8px;background:var(--bg);border-radius:6px;border:.5px solid var(--border2)">';
      h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">';
      h += '<div class="fg" style="min-width:120px"><label class="fl">Name</label><input id="en-' + p.id + '" value="' + esc(p.name) + '"></div>';
      h += '<div class="fg" style="min-width:80px"><label class="fl">Teacher</label><input id="et-' + p.id + '" value="' + esc(p.teacher||'') + '"></div>';
      h += '<div class="fg" style="min-width:120px"><label class="fl">Teacher full name</label><input id="etf-' + p.id + '" value="' + esc(p.teacherFull||'') + '"></div>';
      h += '<div class="fg" style="min-width:70px"><label class="fl">Lesson time</label><input id="elt-' + p.id + '" value="' + esc(fmtTime(p.lessonTime||'')) + '" placeholder="4:30 PM"></div>';
      h += '<div class="fg" style="min-width:50px"><label class="fl">Dur (min)</label><input id="ed2-' + p.id + '" type="number" min="1" max="20" value="' + (parseInt(p.dur)||4) + '" style="width:60px"></div>';
      h += '<div class="fg" style="min-width:80px"><label class="fl">Day</label><select id="eday-' + p.id + '" onchange="updUaSeg(\'' + p.id + '\')">' + uDayOpts + '</select></div>';
      h += '<div class="fg" style="min-width:80px"><label class="fl">Segment</label><select id="eseg-' + p.id + '">' + uSegOpts + '</select></div>';
      h += '<div class="fg" style="min-width:100px"><label class="fl">Password</label><input id="epw-' + p.id + '" value="' + esc(p.password||'') + '"></div>';
      h += '<div class="fg" style="min-width:180px"><label class="fl">Family email</label><input id="ee-' + p.id + '" type="email" value="' + esc(p.email||'') + '" placeholder="email@example.com"></div>';
      h += '<div class="fg" style="min-width:90px"><label class="fl">Parent first</label><input id="epf-' + p.id + '" value="' + esc(p.parentFirst||'') + '"></div>';
      h += '<div class="fg" style="min-width:90px"><label class="fl">Parent last</label><input id="epl-' + p.id + '" value="' + esc(p.parentLast||'') + '"></div>';
      h += '<div class="fg" style="min-width:110px"><label class="fl">Instrument</label><input id="einst-' + p.id + '" value="' + esc(p.instrument||'') + '"></div>';
      var uegNames = getStoredGuestNames(p.notes);
      h += '<div class="fg" style="min-width:50px"><label class="fl">Guests</label><input id="egc-' + p.id + '" type="number" min="0" max="3" value="' + (parseInt(p.guests)||0) + '" style="width:55px"></div>';
      h += '<div class="fg" style="min-width:130px"><label class="fl">Guest 1 name</label><input id="egn1-' + p.id + '" value="' + esc(uegNames[0]||'') + '" placeholder="Optional" oninput="syncGuestCount(&apos;' + p.id + '&apos;)"></div>';
      h += '<div class="fg" style="min-width:130px"><label class="fl">Guest 2 name</label><input id="egn2-' + p.id + '" value="' + esc(uegNames[1]||'') + '" placeholder="Optional" oninput="syncGuestCount(&apos;' + p.id + '&apos;)"></div>';
      h += '<div class="fg" style="min-width:130px"><label class="fl">Guest 3 name</label><input id="egn3-' + p.id + '" value="' + esc(uegNames[2]||'') + '" placeholder="Optional" oninput="syncGuestCount(&apos;' + p.id + '&apos;)"></div>';
      h += '</div>';
      h += '<button class="btn btnp" style="font-size:11px;padding:4px 10px" onclick="saveEdit(\'' + p.id + '\')">Save</button> ';
      h += '<button class="btn" style="font-size:11px;padding:4px 10px" onclick="toggleEdit(\'' + p.id + '\')">Cancel</button>';
      h += '</div>';
      h += buildNotesPanel(p);
      h += '</li>';
    });
    h += '</ul></div></div></div>';
  }

  return h;
}

function rAdd() {
  var dayOpts = '<option value="Unassigned">Unassigned (Saturday)</option>' + DAYS.map(function(d) { return '<option>' + d + '</option>'; }).join("");
  var gOpts   = [0,1,2,3].map(function(n) { return '<option value="' + n + '"' + (n === 0 ? ' selected' : '') + '>' + n + '</option>'; }).join("");
  var r = '<div class="card"><div class="lbl">Add a student</div>';
  r += '<div class="fr">';
  r += '<div class="fg"><label class="fl">Full Name</label><input id="an" placeholder="First Last"></div>';
  r += '<div class="fg"><label class="fl">Teacher</label><input id="at" placeholder="e.g. Julia"></div></div>';
  r += '<div class="fr"><div class="fg"><label class="fl">Day</label><select id="ad" onchange="updSeg()">' + dayOpts + '</select></div>';
  r += '<div class="fg"><label class="fl">Segment</label><select id="as"><option value="Early">Early (4pm)</option><option value="Late">Late (5pm)</option></select></div>';
  r += '<div class="fg"><label class="fl">Guests</label><select id="ag">' + gOpts + '</select></div></div>';
  r += '<div class="fr"><div class="fg"><label class="fl">Lesson Time (optional)</label><input id="alt" placeholder="e.g. 4:30 PM"></div></div>';
  r += '<button class="btn btnp" style="margin-top:.75rem" onclick="doAdd()">Add student</button></div>';
  return r;
}

tryAutoLogin();
</script>
</body>
</html>
